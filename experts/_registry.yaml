---
# Expert Registry v1.2.0

# ADD NEW EXPERT:
# 1. mkdir experts/[domain]/kde-expert-[id]-001/
# 2. cp _template/SPEC.md + interface.yaml → fill in
# 3. git add + commit + push

# BETA ENGINE CALLS EXPERT:
# =============================================
# Engine identifies domain from task
# Loads expert interface + knowledge
# Calls expert.invoke({task, action, context, knowledge_refs})
# Expert returns {result, confidence, decisions, validation}
# =============================================

experts:
  - id: KDE-EXPERT-SLD-001
    domain: utility-sld
    path: sld/kde-expert-sld-001/
    actions: [render, validate, compose]

  - id: KDE-EXPERT-GIS-001
    domain: gis
    path: gis/kde-expert-gis-001/
    actions: [render, analyze]

# =========================================================================
# GOVERNANCE NOTES
# =========================================================================
governance:
  next_actions:
    - expert_id: KDE-EXPERT-GIS-001
      action: Validate
      priority: high
      notes: Run validation suite per validation.yaml criteria
    - expert_id: KDE-EXPERT-SLD-001
      action: Validate
      priority: high
      notes: Run primitive validation suite
  
  pending_review: []
