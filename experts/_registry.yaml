  # =========================================================================
  # HOW TO ADD A NEW EXPERT (Checklist)
  # =========================================================================
  # 1. Create directory: experts/[domain]/kde-expert-[id]-001/
  # 2. Copy _template/SPEC.md → SPEC.md, fill in details
  # 3. Copy _template/interface.yaml → interface.yaml, customize
  # 4. Create CHANGELOG.md with version 1.0.0
  # 5. Add entry to experts[] below
  # 6. Commit and push
  # =========================================================================
  
  # =========================================================================
  # HOW BETA ENGINE CALLS AN EXPERT
  # =========================================================================
  invocation_example: |
    ## Beta Engine → Expert Call
    ```yaml
    # 1. Engine identifies task domain
    task: "Render circuit breaker CB-101"
    action: render
    
    # 2. Engine selects expert by domain match
    expert: KDE-EXPERT-SLD-001
    
    # 3. Engine loads expert interface and knowledge
    knowledge_refs: [KDE-PRIM-CB-001, KDE-VOLTAGE-NGCP-001]
    
    # 4. Expert produces output
    result:
      svg: "<g id='CB-101'>...</g>"
      confidence: HIGH
      decisions: ["Red fill for CLOSED state"]
      validation: [{rule: CB-001, status: PASS}]
    ```
  
