---
# Expert Interface Template
# Version: 1.1.0

expert_id: KDE-EXPERT-[DOMAIN]-[N]
domain: [domain-name]

# Invoke
# Beta Engine calls: {task, action?, context?, knowledge_refs?}

invoke:
  method: direct  # direct | skill | api
  params:
    task: string      # REQUIRED - what to do
    action: string    # OPTIONAL - specific action
    context: object    # OPTIONAL - execution context
    knowledge_refs: array  # OPTIONAL - knowledge IDs

# Produce
produces:
  result: object       # Expert output
  confidence: enum     # HIGH | MEDIUM | LOW
  decisions: array      # Engineering decisions
  validation: object   # Validation results

# Errors
errors:
  E001: insufficient_context  # Need more info
  E002: unknown_domain        # Outside scope
  E003: validation_failure     # Output failed
  E004: knowledge_missing    # Required knowledge unavailable

# Confidence
confidence:
  HIGH: "valid output + all knowledge"
  MEDIUM: "warnings or partial knowledge"
  LOW: "knowledge missing or errors"

# Supported (customize for each expert)
capabilities: []  # List of capabilities
actions: []      # render, validate, etc.
