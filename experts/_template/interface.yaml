---
# Expert Interface
expert_id: KDE-EXPERT-[DOMAIN]-[N]
domain: [domain]

# Engine calls with:
#   task: string (REQUIRED)
#   action?: string
#   context?: object
#   knowledge_refs?: array

invoke:
  method: direct
  params: [task, action?, context?, knowledge_refs?]

produces:
  - result: object
  - confidence: HIGH|MEDIUM|LOW
  - decisions: array
  - validation: object

errors: [E001-insufficient_context, E002-unknown_domain, E003-validation_failure, E004-knowledge_missing]

confidence:
  HIGH: valid + knowledge
  MEDIUM: warnings
  LOW: missing knowledge

actions: []  # customize
