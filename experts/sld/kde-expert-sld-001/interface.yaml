---
# SLD Expert Interface
expert_id: KDE-EXPERT-SLD-001
domain: utility-sld

# Engine calls:
#   task: "Render CB-101"
#   action: render
#   context: {voltage_level: "115kV"}
#   knowledge_refs: [KDE-PRIM-CB-001]

invoke:
  method: direct
  params: [task, action, context?, primitives?, knowledge_refs?]
  actions: [render, validate, compose, analyze]
  primitives: [circuit-breaker, disconnect-switch, earthing-switch, busbar]

produces:
  result: object
  confidence: HIGH|MEDIUM|LOW
  decisions: array
  validation: object

errors: [E001-context, E002-unknown, E003-validation, E004-knowledge]

confidence:
  HIGH: valid + knowledge
  MEDIUM: warnings
  LOW: missing knowledge
