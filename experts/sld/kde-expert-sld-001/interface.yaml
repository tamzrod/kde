---
# SLD Expert Interface
# Version: 1.1.0

expert_id: KDE-EXPERT-SLD-001
domain: utility-sld

# Invoke
# Beta Engine calls expert with:
#   task: string (what to do)
#   action: render|validate|compose|analyze
#   context: {domain, voltage_level?, layout_type?}
#   primitives: [{type, id, state, position}]
#   knowledge_refs: [optional knowledge IDs]

invoke:
  method: direct
  params:
    task: string        # REQUIRED - what to do
    action: string      # REQUIRED - render|validate|compose|analyze
    context: object      # OPTIONAL - domain, voltage_level, layout_type
    primitives: array    # OPTIONAL - list of primitives
    knowledge_refs: array  # OPTIONAL - knowledge IDs

# Produce
produces:
  result: object       # Expert output (SVG, topology, validation)
  confidence: enum   # HIGH | MEDIUM | LOW
  decisions: array  # Engineering decisions made
  validation: object # Validation results

# Errors
errors:
  E001: insufficient_context    # Need more info
  E002: unknown_primitive     # Unknown type
  E003: validation_failure    # Output failed validation
  E004: knowledge_missing    # Required knowledge unavailable

# Confidence
confidence:
  HIGH: "valid output + all knowledge available"
  MEDIUM: "warnings present or partial knowledge"
  LOW: "knowledge missing or critical errors"

# Supported
primitives: [circuit-breaker, disconnect-switch, earthing-switch, busbar]
actions: [render, validate, compose, analyze]
voltage_levels: [500kV, 230kV, 115kV, 69kV]
