# Runtime Artifact Protection Configuration

**Document ID**: RUNTIME-PROTECTION
**Version**: 1.0.0
**Date**: 2026-07-23
**Status**: PRODUCTION
**Authority**: Human Authority
**Source**: LAB-039 Revision, LAB-040 Implementation

---

# IMPORTANT: Protection configuration is NOT subject to session override
# This ensures protection cannot be bypassed during any session.

protection:
  # Version for tracking
  version: "1.0.0"
  
  # CRITICAL: Protection cannot be overridden by session
  # This setting is enforced by Runtime and cannot be changed by session override
  override_allowed: false
  
  # Protection levels configuration
  levels:
    ABSOLUTE:
      description: "Never modify"
      priority: 100
      block_by_default: true
      override_requires: "GOVERNANCE_APPROVAL"
      operations:
        CREATE: "blocked"
        MODIFY: "blocked"
        DELETE: "blocked"
        RENAME: "blocked"
        MOVE: "blocked"
      
    HIGH:
      description: "Human approval required"
      priority: 75
      block_by_default: false
      override_requires: "SESSION_APPROVAL"
      operations:
        CREATE: "warn_and_acknowledge"
        MODIFY: "warn_and_acknowledge"
        DELETE: "warn_and_acknowledge"
        RENAME: "warn_and_acknowledge"
        MOVE: "warn_and_acknowledge"
      
    MEDIUM:
      description: "Follow SOP"
      priority: 50
      block_by_default: false
      override_requires: "NONE"
      operations:
        CREATE: "warn"
        MODIFY: "warn"
        DELETE: "warn"
        RENAME: "warn"
        MOVE: "warn"
      
    LOW:
      description: "Mutable"
      priority: 25
      block_by_default: false
      override_requires: "NONE"
      operations:
        CREATE: "allow"
        MODIFY: "allow"
        DELETE: "allow"
        RENAME: "allow"
        MOVE: "allow"

  # Artifact protection patterns
  # All patterns use regex syntax
  artifacts:
    # SEEDS - ABSOLUTE protection
    seeds:
      pattern: "seeds/seed-*"
      level: ABSOLUTE
      recursive: true
      description: "Seed reasoning DNA"
      
    # EVIDENCE - ABSOLUTE protection
    evidence:
      pattern: "**/evidence/**"
      level: ABSOLUTE
      recursive: true
      description: "Scientific evidence files"
      
    # HISTORICAL EXPERIMENTS - HIGH protection
    # Experiments with LAB-XXX where XXX < current highest
    historical_experiments:
      pattern: "laboratory/experiments/LAB-[0-9]{3}"
      level: HIGH
      recursive: true
      exclude_current: true
      description: "Historical experiments (evidence)"
      note: "Current experiments are MEDIUM protection"
      
    # PROMOTED KNOWLEDGE - ABSOLUTE protection
    promoted_knowledge:
      pattern: "knowledge/**"
      level: ABSOLUTE
      recursive: true
      description: "Promoted knowledge (validated)"
      conditions:
        - "Status = PROMOTED"
        
    # GOVERNANCE DOCUMENTS - HIGH protection
    governance:
      pattern: "governance/**"
      level: HIGH
      recursive: true
      description: "Governance documents"
      
    # RUNTIME CONFIGURATION - HIGH protection
    runtime_config:
      pattern: "governance/runtime/**"
      level: HIGH
      recursive: true
      description: "Runtime configuration files"
      
    # BOOTSTRAP - HIGH protection
    bootstrap:
      pattern: "laboratory/BOOTSTRAP.md"
      level: HIGH
      recursive: false
      description: "Bootstrap entry point"
      
    # LABORATORY RULES - HIGH protection
    laboratory_rules:
      pattern: "laboratory/LABORATORY-RULES.md"
      level: HIGH
      recursive: false
      description: "Laboratory Rules"
      
    # CURRENT EXPERIMENTS - MEDIUM protection
    current_experiments:
      pattern: "laboratory/experiments/LAB-[0-9]{3}/**"
      level: MEDIUM
      recursive: true
      description: "Current active experiments"
      note: "Only experiments not matching historical pattern"
      
    # INVESTIGATIONS - MEDIUM protection
    investigations:
      pattern: "laboratory/investigations/**"
      level: MEDIUM
      recursive: true
      description: "Active investigations"
      
    # TEMPLATES - LOW protection
    templates:
      pattern: "laboratory/templates/**"
      level: LOW
      recursive: true
      description: "Reference templates"
      
    # PLAYGROUND - LOW protection
    playground:
      pattern: "playground/**"
      level: LOW
      recursive: true
      description: "Mutable workspace"
      
    # SCRATCH - LOW protection
    scratch:
      pattern: "scratch/**"
      level: LOW
      recursive: true
      description: "Scratch workspace"

  # Pattern matching configuration
  matching:
    # When multiple patterns match, highest protection wins
    priority: "HIGHEST_WINS"
    
    # Case sensitivity for pattern matching
    case_sensitive: true
    
    # Resolve symlinks before matching
    resolve_symlinks: true

  # Default settings for unmatched artifacts
  defaults:
    # Protection level for artifacts not matching any pattern
    unknown_artifact: MEDIUM
    
    # Warn when no pattern matches
    warn_on_unknown: true
    
    # Log unknown artifact access
    log_unknown: true

  # Pattern validation configuration
  validation:
    enabled: true
    
    # Abort Runtime startup if validation fails
    abort_on_error: true
    
    # Validation checks to perform
    checks:
      - schema_validation      # Validate YAML structure
      - regex_compilation      # Test pattern compilation
      - path_simulation        # Test against sample paths
      
    # Sample paths for simulation testing
    sample_paths:
      - "laboratory/experiments/LAB-001/experiment.md"
      - "laboratory/experiments/LAB-037/evidence/data.csv"
      - "seeds/seed-001/seed.yaml"
      - "knowledge/finding-001.md"
      - "governance/RUNTIME-STARTUP.md"
      
    # Validation timeout (seconds)
    validation_timeout_seconds: 30

  # Error handling configuration
  error_handling:
    # Logging level for protection events
    log_level: "DEBUG"
    
    # Log format
    log_format: "[{timestamp}] [{level}] {message}"
    
    # Events to log
    events:
      - PROTECTION_LOAD_SUCCESS
      - PROTECTION_LOAD_FAILED
      - PATTERN_VALIDATION_FAILED
      - PROTECTION_OVERRIDE_ATTEMPT
      - PROTECTION_CHECK_SUCCESS
      - PROTECTION_CHECK_FAILED
      - PROTECTION_WARNING
      
    # Alert on these events
    alert_on:
      - PATTERN_VALIDATION_FAILED
      - PROTECTION_OVERRIDE_ATTEMPT
      - PROTECTION_CHECK_FAILED
      
    # Error behavior categories
    errors:
      FATAL:
        - "protection.yaml not found"
        - "Invalid YAML syntax"
        - "Missing required field: override_allowed"
        - "override_allowed is not false"
        - "Invalid regex pattern"
        - "Schema validation failed"
        behavior: "abort_runtime"
        
      WARNING:
        - "Pattern matches no paths"
        - "Pattern matches too many paths"
        - "Duplicate protection level"
        behavior: "log_and_continue"
        
      RUNTIME:
        - "Protection check exception"
        - "Registry lookup failed"
        behavior: "fail_closed"

# Feature flags for Runtime Protection Module
feature_flags:
  # Master switch for protection
  protection_enabled: true
  
  # Individual feature toggles
  pre_write_check: true      # Check before file writes
  warning_system: true        # Display warnings
  blocking_mode: false        # Block protected writes (warn-only initially)
  periodic_verification: true # Scheduled integrity checks
  
# Graceful degradation configuration
degradation:
  # Automatic degradation triggers
  triggers:
    performance_threshold_ms: 100  # If check takes >100ms
    error_rate_threshold: 0.05     # If >5% of checks fail
    consecutive_errors: 3          # If 3 errors in a row
    
  # Degradation behavior
  on_trigger:
    level: 1  # Move to Warning Mode
    alert: true
    log: true

# Change Log
changelog:
  - version: "1.0.0"
    date: "2026-07-23"
    changes: "Initial protection configuration"
    authority: "Human Review"
