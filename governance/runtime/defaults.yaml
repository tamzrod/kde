## Human Authority Principle

**The default Engine and default Seed are under exclusive human authority.**

Only a human may:
- Change the default Engine
- Change the default Seed
- Override Runtime defaults for a session

KDE shall never:
- Promote itself to default
- Change defaults automatically
- Infer a better default
- Rewrite this configuration

---

## Session Override

Experiments and Investigations may specify alternate engines or seeds:

```yaml
session_override:
  engine: KDE-ENGINE-004  # Optional override
  seed: SEED-001         # Optional override
```

**Rules:**
1. Override applies only to the current session
2. Override does not modify this configuration
3. When session ends, Runtime returns to these defaults
4. Override must be explicit in the session configuration

---

## Browser-Style Default Model

This configuration implements a **browser-style default model**:

| Browser Behavior | KDE Runtime Behavior |
|-----------------|---------------------|
| Home page set by user | Default Engine set by human |
| User can change anytime | Human can change anytime |
| Extensions can override temporarily | Sessions can override temporarily |
| User always has final authority | Human always has final authority |

**Key Principle**: Scientific advancement (new Engine status) does not automatically change operational defaults.

---

## Engine Status vs. Default

| Engine | Status | Default | Explanation |
|--------|--------|---------|-------------|
| KDE-ENGINE-001 | Historical | NO | Scientifically deprecated |
| KDE-ENGINE-002 | Active | **YES** | Scientifically active, human-selected as default |
| KDE-ENGINE-003 | Experimental | NO | Scientifically immature |
| KDE-ENGINE-004 | Candidate | NO | Scientifically validating |

**Key Insight**: An Engine can have any Status and be Default or not. They are independent dimensions.

