<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substation Bay - Iteration 6 (5-Stage Renderer)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #000000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.875rem; margin-bottom: 1rem; }
    .container { background: #111; border-radius: 12px; padding: 1.5rem; }
    svg { display: block; background: #000; }
    .controls { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .btn {
      padding: 0.5rem 1rem;
      border: 2px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.15s;
      min-width: 90px;
      background: #222;
      color: #fff;
    }
    .btn:hover { transform: translateY(-1px); border-color: #666; }
    .btn-active { box-shadow: 0 0 0 2px #fff; }
    .btn-closed { border-color: #FF4444; }
    .btn-closed.btn-active { background: #FF4444; color: #fff; }
    .btn-open { border-color: #44FF44; }
    .btn-open.btn-active { background: #44FF44; color: #000; }
    .btn-unknown { border-color: #888; }
    .btn-unknown.btn-active { background: #888; color: #000; }
    .info { font-size: 0.75rem; color: #666; margin-top: 0.5rem; text-align: center; }
    .log { font-size: 0.7rem; color: #555; margin-top: 1rem; text-align: left; max-height: 150px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>Substation Bay - 5-Stage Renderer (Iteration 6)</h1>
  <p class="subtitle">69 kV | Network → Conductors → Draft → Normalized → SVG</p>
  
  <div class="container">
    <svg id="sld" width="950" height="900" viewBox="0 0 950 900">
      <rect width="950" height="900" fill="#000"/>
      <g id="bus-group"></g>
      <g id="feeders-group"></g>
    </svg>
    
    <div class="controls">
      <div style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;">
        <div style="text-align: center;">
          <div style="color: #888; font-size: 0.75rem; margin-bottom: 0.5rem;">FEEDER 1</div>
          <button id="f1-closed" class="btn btn-closed" onclick="setFeederState(1, 'CLOSED')">CLOSED</button>
          <button id="f1-open" class="btn btn-open btn-active" onclick="setFeederState(1, 'OPEN')">OPEN</button>
          <button id="f1-unknown" class="btn btn-unknown" onclick="setFeederState(1, 'UNKNOWN')">UNKNOWN</button>
        </div>
        <div style="text-align: center;">
          <div style="color: #888; font-size: 0.75rem; margin-bottom: 0.5rem;">FEEDER 2</div>
          <button id="f2-closed" class="btn btn-closed btn-active" onclick="setFeederState(2, 'CLOSED')">CLOSED</button>
          <button id="f2-open" class="btn btn-open" onclick="setFeederState(2, 'OPEN')">OPEN</button>
          <button id="f2-unknown" class="btn btn-unknown" onclick="setFeederState(2, 'UNKNOWN')">UNKNOWN</button>
        </div>
        <div style="text-align: center;">
          <div style="color: #888; font-size: 0.75rem; margin-bottom: 0.5rem;">FEEDER 3</div>
          <button id="f3-closed" class="btn btn-closed" onclick="setFeederState(3, 'CLOSED')">CLOSED</button>
          <button id="f3-open" class="btn btn-open" onclick="setFeederState(3, 'OPEN')">OPEN</button>
          <button id="f3-unknown" class="btn btn-unknown btn-active" onclick="setFeederState(3, 'UNKNOWN')">UNKNOWN</button>
        </div>
      </div>
    </div>
    
    <p class="info">
      5-Stage: [1] Network → [2] Conductors → [3] Draft → [4] Normalized → [5] SVG
    </p>
    
    <div id="log" class="log"></div>
  </div>

  <script>
    // ============================================================
    // 5-STAGE RENDERER
    // Per EXP-014: Electrical Network Model
    // ============================================================
    
    const logDiv = document.getElementById('log');
    function log(msg) {
      console.log(msg);
      logDiv.innerHTML += msg + '<br>';
    }
    function clearLog() { logDiv.innerHTML = ''; }
    
    // ============================================================
    // STAGE 1: BUILD ELECTRICAL NETWORK
    // ============================================================
    
    /**
     * Connection Point (EXP-014)
     * Immutable interface where conductors attach
     */
    class ConnectionPoint {
      constructor(parent, name, type) {
        this.parent = parent;
        this.name = name;
        this.type = type; // 'top', 'bottom', 'main', 'ground'
        this.connected = null; // Reference to connected conductor
      }
      
      connect(conductor) {
        this.connected = conductor;
        log(`  [CP] ${this.parent.id}.${this.name} connected`);
      }
      
      disconnect() {
        this.connected = null;
      }
      
      isConnected() {
        return this.connected !== null;
      }
    }
    
    /**
     * Engineering Object Base (EXP-014)
     * Independent object that exposes connection points
     */
    class EngineeringObject {
      constructor(id, type) {
        this.id = id;
        this.type = type;
        this.connectionPoints = {};
      }
      
      addConnectionPoint(name, type) {
        this.connectionPoints[name] = new ConnectionPoint(this, name, type);
        return this.connectionPoints[name];
      }
      
      getConnectionPoint(name) {
        return this.connectionPoints[name];
      }
    }
    
    /**
     * Series Object (EXP-014)
     * Interrupts path, exposes 2 connection points
     * Examples: CB, DS
     */
    class SeriesObject extends EngineeringObject {
      constructor(id, type) {
        super(id, type);
        this.addConnectionPoint('top', 'top');
        this.addConnectionPoint('bottom', 'bottom');
        this.state = 'CLOSED'; // CLOSED or OPEN or UNKNOWN
        log(`  [SERIES] ${id} created (top, bottom)`);
      }
      
      setState(state) {
        this.state = state;
        log(`  [SERIES] ${this.id} state = ${state}`);
      }
    }
    
    /**
     * Parallel Object (EXP-014)
     * Branches without interrupting, exposes 1 connection point
     * Examples: ES, SA
     */
    class ParallelObject extends EngineeringObject {
      constructor(id, type) {
        super(id, type);
        this.addConnectionPoint('main', 'main');
        // Ground is internal, not a connection point
        log(`  [PARALLEL] ${id} created (main only)`);
      }
      
      setState(state) {
        this.state = state;
        log(`  [PARALLEL] ${this.id} state = ${state}`);
      }
    }
    
    /**
     * Bus (EXP-014)
     * Continuous conductor with multiple connection points
     */
    class Bus extends EngineeringObject {
      constructor(id, voltage) {
        super(id, 'bus');
        this.voltage = voltage;
        // Add connection points for each feeder
        this.feederConnections = [];
        log(`  [BUS] ${id} created (${voltage})`);
      }
      
      addFeederConnection() {
        const idx = this.feederConnections.length;
        const cp = this.addConnectionPoint(`feeder_${idx}`, 'feeder');
        this.feederConnections.push(cp);
        log(`  [BUS] Added feeder connection ${idx}`);
        return cp;
      }
    }
    
    /**
     * Network Container
     * Holds all objects and conductors
     */
    class ElectricalNetwork {
      constructor() {
        this.objects = {};
        this.conductors = [];
        this.bus = null;
        this.feeders = [];
        log('[NETWORK] Electrical Network created');
      }
      
      addObject(obj) {
        this.objects[obj.id] = obj;
        log(`[NETWORK] Added object: ${obj.id}`);
      }
      
      setBus(bus) {
        this.bus = bus;
        this.addObject(bus);
      }
      
      addConductor(fromCP, toCP, isParallel = false) {
        const conductor = {
          from: fromCP,
          to: toCP,
          isParallel: isParallel,
          isBroken: false
        };
        
        // NOTE: isBroken will be set later in generateConductors()
        // Don't set it here to avoid confusion about what breaks the conductor
        
        fromCP.connect(conductor);
        toCP.connect(conductor);
        this.conductors.push(conductor);
        
        // Log as PENDING - actual broken status determined in Stage 2
        log(`[CONDUCTOR] ${fromCP.parent.id}.${fromCP.name} → ${toCP.parent.id}.${toCP.name} [PENDING]`);
        
        return conductor;
      }
      
      getConductors() {
        return this.conductors;
      }
    }
    
    /**
     * Build the electrical network for a feeder
     * 
     * CORRECT TOPOLOGY (Per EXP-014):
     * 
     * Main conductor (series path):
     *   Bus → DS_top → CB → DS_bottom → Outgoing
     * 
     * ES (parallel branch):
     *   ES.main connects to main conductor (branch point)
     *   ES never interrupts the main conductor
     *   ES has only ONE connection point (main)
     */
    function buildFeederNetwork(network, feederNum, state) {
      log(`\n[FEEDER ${feederNum}] Building network...`);
      
      // Create series devices (these interrupt the main path)
      const dsTop = new SeriesObject(`f${feederNum}_ds_top`, 'series');
      const cb = new SeriesObject(`f${feederNum}_cb`, 'series');
      const dsBottom = new SeriesObject(`f${feederNum}_ds_bottom`, 'series');
      
      dsTop.setState(state);
      cb.setState(state);
      dsBottom.setState(state);
      
      // Create parallel device (ES)
      // ES has ONLY ONE connection point: main
      // ES branches from the main conductor, does NOT interrupt it
      const es = new ParallelObject(`f${feederNum}_es`, 'parallel');
      es.setState(state);
      
      // Add to network
      network.addObject(dsTop);
      network.addObject(cb);
      network.addObject(dsBottom);
      network.addObject(es);
      
      // CORRECT SERIES PATH: DS_top → CB → DS_bottom
      // (ES is NOT in series - it's a parallel branch)
      network.addConductor(dsTop.getConnectionPoint('bottom'), cb.getConnectionPoint('top'));
      network.addConductor(cb.getConnectionPoint('bottom'), dsBottom.getConnectionPoint('top'));
      
      // ES BRANCH: Connect ES.main to a branch point on the main conductor
      // The branch point is between DS_top and CB
      // ES.main connects to the main conductor at a junction point
      const branchCP = new ConnectionPoint({ id: `f${feederNum}_branch` }, 'branch', 'junction');
      network.addConductor(dsTop.getConnectionPoint('bottom'), branchCP);
      network.addConductor(branchCP, es.getConnectionPoint('main'));
      
      return {
        dsTop, cb, dsBottom, es,
        busConnection: dsTop.getConnectionPoint('top'),
        outgoingConnection: dsBottom.getConnectionPoint('bottom')
      };
    }
    
    // ============================================================
    // STAGE 2: GENERATE ELECTRICAL CONDUCTORS
    // ============================================================
    
    /**
     * Generate conductors between connected objects
     * Per EXP-014: Conductors preserve electrical continuity
     * 
     * Key rules:
     * - Series Object (OPEN): Breaks the path at its connection points
     * - Series Object (CLOSED): Path continuous through
     * - Series Object (UNKNOWN): Path continuous (indeterminate)
     * - Parallel Object (ES): NEVER breaks the main conductor
     *   The main conductor ALWAYS continues through a Parallel Object
     */
    function generateConductors(network) {
      log('\n[CONDUCTORS] Generating from connection points...');
      
      const conductors = network.getConductors();
      let continuous = 0, broken = 0;
      
      conductors.forEach(c => {
        // Check if either endpoint device breaks continuity
        const fromDevice = c.from.parent;
        const toDevice = c.to.parent;
        
        // A conductor is broken if:
        // 1. The FROM device is a Series Object in OPEN state
        // 2. The TO device is a Series Object in OPEN state
        // 
        // IMPORTANT: Parallel Objects (ES) NEVER break the main conductor!
        
        if (fromDevice.type === 'series' && fromDevice.state === 'OPEN') {
          c.isBroken = true;
        }
        if (toDevice.type === 'series' && toDevice.state === 'OPEN') {
          c.isBroken = true;
        }
        
        if (c.isBroken) {
          broken++;
          log(`  [BREAK] ${c.from.parent.id}.${c.from.name} → ${c.to.parent.id}.${c.to.name}`);
        } else {
          continuous++;
        }
      });
      
      log(`  Total: ${continuous} continuous, ${broken} broken (Series OPEN)`);
      
      // Verify ES never breaks main conductor
      // ES is a Parallel Object - main conductor ALWAYS continues
      Object.values(network.objects).forEach(obj => {
        if (obj.type === 'parallel') {
          // Check conductors going TO ES main (these are part of main path)
          const toES = obj.getConnectionPoint('main');
          const conductorToES = toES.connected;
          
          // The conductor TO ES is part of the main conductor
          // It should only be broken if a Series Object before it is OPEN
          // NOT because ES breaks it (ES never breaks the main path)
          
          // Verify: conductor from Series to ES.main
          if (conductorToES) {
            const fromCP = conductorToES.from;
            const toCP = conductorToES.to;
            
            if (fromCP.parent.type === 'series' && fromCP.parent.state === 'OPEN') {
              // This is expected - Series Object before ES is OPEN
              // The ES is NOT breaking the conductor, the Series Object is
              log(`  [OK] Conductor broken by ${fromCP.parent.id} (Series), not by ES ${obj.id}`);
            }
          }
        }
      });
    }
    
    // ============================================================
    // STAGE 3: CONSTRUCTION DRAFT
    // Visual arrangement, spacing, clearances
    // ============================================================
    
    const DRAFT = {
      FEEDER_X: [125, 475, 825],
      BUS_Y: 60,
      DEVICE_SPACING: 160,
      ES_BRANCH_OFFSET: 50,
      CONDUCTOR_WIDTH: 4,
      BUS_WIDTH: 8,
      COLOR: '#00FFFF'
    };
    
    /**
     * Create construction draft - positions for visual layout
     */
    function createConstructionDraft(network) {
      log('\n[DRAFT] Creating construction layout...');
      
      const draft = {
        bus: { x: 50, y: DRAFT.BUS_Y, width: 900 },
        feeders: []
      };
      
      DRAFT.FEEDER_X.forEach((x, idx) => {
        const feederNum = idx + 1;
        const state = feederStates[feederNum];
        
        const feederDraft = {
          x: x,
          y: DRAFT.BUS_Y,
          devices: [
            { type: 'ds_top', y: 0 },
            { type: 'es', y: DRAFT.DEVICE_SPACING },
            { type: 'cb', y: DRAFT.DEVICE_SPACING * 2 },
            { type: 'ds_bottom', y: DRAFT.DEVICE_SPACING * 3 }
          ],
          state: state
        };
        
        draft.feeders.push(feederDraft);
        log(`  Feeder ${feederNum}: x=${x}, state=${state}`);
      });
      
      return draft;
    }
    
    // ============================================================
    // STAGE 4: NORMALIZE GEOMETRY
    // Convert draft to normalized coordinates
    // ============================================================
    
    function normalizeGeometry(draft) {
      log('\n[NORMALIZE] Converting to normalized geometry...');
      
      const NORM = {
        SCALE: 120, // Device height in pixels
        bus: {
          y: draft.bus.y / 120
        },
        feeders: draft.feeders.map(f => ({
          x: f.x / 120,
          y: f.y / 120,
          state: f.state,
          devices: f.devices.map(d => ({
            type: d.type,
            y: d.y / 120
          }))
        }))
      };
      
      log(`  Scale: ${NORM.SCALE}px = 1.0 unit`);
      
      return NORM;
    }
    
    // ============================================================
    // STAGE 5: GENERATE SVG
    // Render from normalized geometry
    // ============================================================
    
    const feederStates = { 1: 'OPEN', 2: 'CLOSED', 3: 'UNKNOWN' };
    
    function generateSVG(network, draft, norm) {
      log('\n[SVG] Generating from normalized geometry...');
      
      const busGroup = document.getElementById('bus-group');
      const feedersGroup = document.getElementById('feeders-group');
      busGroup.innerHTML = '';
      feedersGroup.innerHTML = '';
      
      // Render Bus
      const busLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      busLine.setAttribute('x1', draft.bus.x);
      busLine.setAttribute('y1', draft.bus.y);
      busLine.setAttribute('x2', draft.bus.x + draft.bus.width);
      busLine.setAttribute('y2', draft.bus.y);
      busLine.setAttribute('stroke', DRAFT.COLOR);
      busLine.setAttribute('stroke-width', DRAFT.BUS_WIDTH);
      busLine.setAttribute('stroke-linecap', 'round');
      busGroup.appendChild(busLine);
      
      const busLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      busLabel.setAttribute('x', 475);
      busLabel.setAttribute('y', 40);
      busLabel.setAttribute('text-anchor', 'middle');
      busLabel.setAttribute('fill', '#fff');
      busLabel.setAttribute('font-size', '14');
      busLabel.textContent = '69 kV Bus';
      busGroup.appendChild(busLabel);
      
      const incomingLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      incomingLabel.setAttribute('x', 475);
      incomingLabel.setAttribute('y', 25);
      incomingLabel.setAttribute('text-anchor', 'middle');
      incomingLabel.setAttribute('fill', '#fff');
      incomingLabel.setAttribute('font-size', '14');
      incomingLabel.textContent = 'Incoming';
      busGroup.appendChild(incomingLabel);
      
      // Render Feeders
      draft.feeders.forEach((feeder, idx) => {
        renderFeeder(feedersGroup, network, feeder, idx);
      });
      
      log('[SVG] Render complete');
    }
    
    function renderFeeder(group, network, feeder, idx) {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('id', `feeder-${idx + 1}`);
      
      const x = feeder.x;  // Main conductor X position
      const state = feeder.state;
      const scale = 120;  // Device body height
      const deviceTotal = scale + 30;  // Device + chevron stubs
      
      let y = feeder.y;
      
      // === BUS TO DS_TOP ===
      appendLine(g, x, DRAFT.BUS_Y, x, y, DRAFT.COLOR);
      
      // DS-Top (Series)
      const dsTopG = renderDS(x, y, state);
      g.appendChild(dsTopG);
      y += deviceTotal;
      
      // === DS_TOP TO CB (MAIN CONDUCTOR CONTINUES) ===
      // ES BRANCHES OFF from this section
      const branchY = y + 60;
      appendLine(g, x, y, x, branchY, DRAFT.COLOR);
      
      // ES (Parallel branch)
      const esG = renderES(x, branchY, state);
      g.appendChild(esG);
      
      // Main conductor continues to CB
      const cbY = y + 120;
      appendLine(g, x, branchY, x, cbY, DRAFT.COLOR);
      
      // === CB (Series) ===
      const cbG = renderCB(x, cbY, state);
      g.appendChild(cbG);
      y = cbY + deviceTotal;
      
      // === CB TO DS_BOTTOM ===
      appendLine(g, x, cbY + deviceTotal, x, y, DRAFT.COLOR);
      
      // DS-Bottom (Series)
      const dsBotG = renderDS(x, y, state);
      g.appendChild(dsBotG);
      y += deviceTotal;
      
      // === DS_BOTTOM TO OUTGOING ===
      appendLine(g, x, y, x, y + 40, DRAFT.COLOR);
      
      // Label
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', x);
      label.setAttribute('y', y + 60);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('fill', '#fff');
      label.setAttribute('font-size', '14');
      label.textContent = `Outgoing ${idx + 1}`;
      g.appendChild(label);
      
      group.appendChild(g);
    }
    
    function appendLine(g, x1, y1, x2, y2, color, width = DRAFT.CONDUCTOR_WIDTH) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.setAttribute('stroke', color);
      line.setAttribute('stroke-width', width);
      line.setAttribute('stroke-linecap', 'round');
      g.appendChild(line);
    }
    
    /**
     * Render double-chevron connection marker
     * Standardized connection interface for Series Objects
     */
    function renderDoubleChevron(g, x, y, direction) {
      // direction: 'up' or 'down'
      const chevronSize = 6;
      const spacing = 4;
      
      for (let i = 0; i < 2; i++) {
        const offset = (i - 0.5) * spacing;
        const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        
        if (direction === 'up') {
          chevron.setAttribute('d', `M ${x - chevronSize},${y + offset + chevronSize} L ${x},${y + offset} L ${x + chevronSize},${y + offset + chevronSize}`);
        } else {
          chevron.setAttribute('d', `M ${x - chevronSize},${y - chevronSize + offset} L ${x},${y + offset} L ${x + chevronSize},${y - chevronSize + offset}`);
        }
        chevron.setAttribute('stroke', DRAFT.COLOR);
        chevron.setAttribute('stroke-width', 2);
        chevron.setAttribute('fill', 'none');
        chevron.setAttribute('stroke-linecap', 'round');
        chevron.setAttribute('stroke-linejoin', 'round');
        g.appendChild(chevron);
      }
    }
    
    /**
     * Render Series Object connection interface
     * - Conductor stub
     * - Double-chevron marker
     * - Primitive body
     */
    function renderSeriesInterface(g, x, y, bodyHeight, bodyWidth, direction) {
      // direction: 'top' (body below, conductor above) or 'bottom' (body above, conductor below)
      const stubLength = 15;
      const chevronY = direction === 'top' ? y + stubLength : y - stubLength;
      
      // Conductor stub
      appendLine(g, x, y, x, chevronY, DRAFT.COLOR);
      
      // Double-chevron
      renderDoubleChevron(g, x, chevronY, direction === 'top' ? 'up' : 'down');
      
      // Body position
      const bodyY = direction === 'top' ? chevronY : chevronY - bodyHeight;
      
      return { bodyX: x, bodyY: bodyY, bodyHeight: bodyHeight, bodyWidth: bodyWidth };
    }
    
    function renderDS(x, y, state) {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      const scale = 120;
      
      const config = getStateConfig(state);
      
      // === TOP CONNECTION INTERFACE ===
      // Conductor stub
      appendLine(g, x, y - 15, x, y, DRAFT.COLOR);
      // Double chevron (>>)
      const chevronSize = 5;
      for (let i = 0; i < 2; i++) {
        const offset = (i - 0.5) * 4;
        const chev = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        chev.setAttribute('d', `M ${x - chevronSize},${y + offset} L ${x},${y + offset + chevronSize} L ${x + chevronSize},${y + offset}`);
        chev.setAttribute('stroke', DRAFT.COLOR);
        chev.setAttribute('stroke-width', 2);
        chev.setAttribute('fill', 'none');
        g.appendChild(chev);
      }
      
      // === BOTTOM CONNECTION INTERFACE ===
      // Conductor stub
      appendLine(g, x, y + scale, x, y + scale + 15, DRAFT.COLOR);
      // Double chevron (>>)
      for (let i = 0; i < 2; i++) {
        const offset = (i - 0.5) * 4;
        const chev = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        chev.setAttribute('d', `M ${x - chevronSize},${y + scale + offset + chevronSize} L ${x},${y + scale + offset} L ${x + chevronSize},${y + scale + offset + chevronSize}`);
        chev.setAttribute('stroke', DRAFT.COLOR);
        chev.setAttribute('stroke-width', 2);
        chev.setAttribute('fill', 'none');
        g.appendChild(chev);
      }
      
      // === DEVICE BODY ===
      // Top contact bar (inside device)
      appendLine(g, x - 15, y + 10, x + 15, y + 10, DRAFT.COLOR);
      // Bottom contact bar (inside device)
      appendLine(g, x - 15, y + scale - 10, x + 15, y + scale - 10, DRAFT.COLOR);
      
      // Knife blade (inside device body, between contacts)
      const knife = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      knife.setAttribute('id', `ds-${x}-knife`);
      
      if (config.visible) {
        const topContact = y + 10;
        const bottomContact = y + scale - 10;
        
        if (config.angle === 0) {
          // CLOSED: blade inline (vertical through contacts)
          knife.setAttribute('x1', x);
          knife.setAttribute('y1', topContact);
          knife.setAttribute('x2', x);
          knife.setAttribute('y2', bottomContact);
        } else {
          // OPEN: blade rotated away
          const rad = config.angle * Math.PI / 180;
          const pivotY = (topContact + bottomContact) / 2;
          const halfLen = (bottomContact - topContact) / 2 + 2;
          knife.setAttribute('x1', x - Math.sin(rad) * halfLen);
          knife.setAttribute('y1', pivotY - Math.cos(rad) * halfLen);
          knife.setAttribute('x2', x + Math.sin(rad) * halfLen);
          knife.setAttribute('y2', pivotY + Math.cos(rad) * halfLen);
        }
        knife.setAttribute('stroke', config.color);
      } else {
        knife.style.display = 'none';
      }
      knife.setAttribute('stroke-width', 5);
      knife.setAttribute('stroke-linecap', 'round');
      g.appendChild(knife);
      
      return g;
    }
    
    function renderCB(x, y, state) {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      const scale = 120;
      
      const config = getStateConfig(state);
      
      // === TOP CONNECTION INTERFACE ===
      // Conductor stub
      appendLine(g, x, y - 15, x, y, DRAFT.COLOR);
      // Double chevron (>>)
      const chevronSize = 5;
      for (let i = 0; i < 2; i++) {
        const offset = (i - 0.5) * 4;
        const chev = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        chev.setAttribute('d', `M ${x - chevronSize},${y + offset} L ${x},${y + offset + chevronSize} L ${x + chevronSize},${y + offset}`);
        chev.setAttribute('stroke', DRAFT.COLOR);
        chev.setAttribute('stroke-width', 2);
        chev.setAttribute('fill', 'none');
        g.appendChild(chev);
      }
      
      // === BOTTOM CONNECTION INTERFACE ===
      // Conductor stub
      appendLine(g, x, y + scale, x, y + scale + 15, DRAFT.COLOR);
      // Double chevron (>>)
      for (let i = 0; i < 2; i++) {
        const offset = (i - 0.5) * 4;
        const chev = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        chev.setAttribute('d', `M ${x - chevronSize},${y + scale + offset + chevronSize} L ${x},${y + scale + offset} L ${x + chevronSize},${y + scale + offset + chevronSize}`);
        chev.setAttribute('stroke', DRAFT.COLOR);
        chev.setAttribute('stroke-width', 2);
        chev.setAttribute('fill', 'none');
        g.appendChild(chev);
      }
      
      // === DEVICE BODY ===
      const bodyWidth = 50;
      const bodyX = x - bodyWidth / 2;
      const bodyY = y + 10;
      const bodyHeight = scale - 20;
      
      const body = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      body.setAttribute('x', bodyX);
      body.setAttribute('y', bodyY);
      body.setAttribute('width', bodyWidth);
      body.setAttribute('height', bodyHeight);
      body.setAttribute('rx', 4);
      body.setAttribute('stroke', DRAFT.COLOR);
      body.setAttribute('stroke-width', 2);
      
      if (config.visible) {
        body.setAttribute('fill', config.cbFill);
      } else {
        body.setAttribute('fill', 'transparent');
        body.style.display = 'none';
      }
      g.appendChild(body);
      
      return g;
    }
    
    /**
     * Render ES as a PARALLEL branch
     * 
     * CORRECT VISUAL TOPOLOGY:
     * 
     *         Main conductor (vertical)
     *              │
     *              ├──●─────────────── ← T-junction (branch point)
     *              │                  │
     *              │                  ├──ES (horizontal branch)
     *              │                  │   ├──knife
     *              │                  │   └──ground
     *              │
     *              ↓ (main continues)
     * 
     * ES branches HORIZONTALLY from the main conductor.
     * The main conductor continues VERTICALLY.
     */
    function renderES(branchX, branchY, state) {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      const config = getStateConfig(state);
      
      // Branch extends to the RIGHT from main conductor
      const branchLength = 80;
      const branchEndX = branchX + branchLength;
      const branchEndY = branchY;
      
      // T-junction marker on main conductor
      const tj = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      tj.setAttribute('cx', branchX);
      tj.setAttribute('cy', branchY);
      tj.setAttribute('r', 5);
      tj.setAttribute('fill', DRAFT.COLOR);
      g.appendChild(tj);
      
      // Branch conductor (horizontal, going right)
      const branch = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      branch.setAttribute('x1', branchX);
      branch.setAttribute('y1', branchY);
      branch.setAttribute('x2', branchEndX);
      branch.setAttribute('y2', branchEndY);
      branch.setAttribute('stroke', DRAFT.COLOR);
      branch.setAttribute('stroke-width', DRAFT.CONDUCTOR_WIDTH);
      g.appendChild(branch);
      
      // Knife switch contact (small horizontal line on branch)
      const contactX1 = branchEndX - 15;
      const contactX2 = branchEndX + 15;
      const contactY = branchEndY;
      
      const contact = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      contact.setAttribute('x1', contactX1);
      contact.setAttribute('y1', contactY);
      contact.setAttribute('x2', contactX2);
      contact.setAttribute('y2', contactY);
      contact.setAttribute('stroke', DRAFT.COLOR);
      contact.setAttribute('stroke-width', 3);
      contact.setAttribute('stroke-linecap', 'round');
      g.appendChild(contact);
      
      // Knife blade (rotates from contact)
      const knife = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      knife.setAttribute('id', `es-${branchX}-knife`);
      
      const bladeLength = 40;
      if (config.visible) {
        if (config.angle === 0) {
          // Closed: vertical down from contact
          knife.setAttribute('x1', branchEndX);
          knife.setAttribute('y1', contactY);
          knife.setAttribute('x2', branchEndX);
          knife.setAttribute('y2', contactY + bladeLength);
        } else {
          // Open: angled
          const rad = config.angle * Math.PI / 180;
          knife.setAttribute('x1', branchEndX - Math.sin(rad) * bladeLength * 0.4);
          knife.setAttribute('y1', contactY - Math.cos(rad) * bladeLength * 0.4);
          knife.setAttribute('x2', branchEndX + Math.sin(rad) * bladeLength * 0.6);
          knife.setAttribute('y2', contactY + Math.cos(rad) * bladeLength * 0.6);
        }
        knife.setAttribute('stroke', config.color);
      } else {
        knife.style.display = 'none';
      }
      knife.setAttribute('stroke-width', 5);
      knife.setAttribute('stroke-linecap', 'round');
      g.appendChild(knife);
      
      // Ground conductor (vertical down after knife)
      const groundX = branchEndX;
      const groundStartY = contactY + (config.visible ? bladeLength : 20);
      const groundEndY = groundStartY + 40;
      
      const groundConductor = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      groundConductor.setAttribute('x1', groundX);
      groundConductor.setAttribute('y1', groundStartY);
      groundConductor.setAttribute('x2', groundX);
      groundConductor.setAttribute('y2', groundEndY);
      groundConductor.setAttribute('stroke', DRAFT.COLOR);
      groundConductor.setAttribute('stroke-width', DRAFT.CONDUCTOR_WIDTH);
      g.appendChild(groundConductor);
      
      // Ground symbol (always visible)
      const groundSymbol = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      groundSymbol.setAttribute('transform', `translate(${groundX}, ${groundEndY + 10})`);
      
      const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      stem.setAttribute('x1', 0);
      stem.setAttribute('y1', -10);
      stem.setAttribute('x2', 0);
      stem.setAttribute('y2', 0);
      stem.setAttribute('stroke', DRAFT.COLOR);
      stem.setAttribute('stroke-width', 4);
      groundSymbol.appendChild(stem);
      
      for (let i = 0; i < 3; i++) {
        const bar = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        const barWidth = 16 - i * 3;
        bar.setAttribute('x1', -barWidth / 2);
        bar.setAttribute('y1', i * 4);
        bar.setAttribute('x2', barWidth / 2);
        bar.setAttribute('y2', i * 4);
        bar.setAttribute('stroke', DRAFT.COLOR);
        bar.setAttribute('stroke-width', 3);
        groundSymbol.appendChild(bar);
      }
      g.appendChild(groundSymbol);
      
      return g;
    }
    
    function getStateConfig(state) {
      if (state === 'OPEN') {
        return { angle: 40, color: '#44FF44', cbFill: '#44FF44', visible: true };
      } else if (state === 'CLOSED') {
        return { angle: 0, color: '#FF4444', cbFill: '#FF4444', visible: true };
      } else {
        return { angle: 0, color: 'transparent', cbFill: 'transparent', visible: false };
      }
    }
    
    // ============================================================
    // MAIN RENDER PIPELINE
    // ============================================================
    
    function render() {
      clearLog();
      log('═'.repeat(50));
      log('5-STAGE RENDERER PIPELINE');
      log('═'.repeat(50));
      
      // STAGE 1: Build Electrical Network
      log('\n┌─────────────────────────────────────────┐');
      log('│ STAGE 1: BUILD ELECTRICAL NETWORK        │');
      log('└─────────────────────────────────────────┘');
      
      const network = new ElectricalNetwork();
      const bus = new Bus('main_bus', '69 kV');
      network.setBus(bus);
      
      // Create feeder networks
      const feederConnections = [];
      DRAFT.FEEDER_X.forEach((x, idx) => {
        const feederNum = idx + 1;
        const state = feederStates[feederNum];
        
        // Bus connection point
        const busCP = bus.addFeederConnection();
        
        // Build feeder network
        const feederNet = buildFeederNetwork(network, feederNum, state);
        
        // Connect feeder to bus
        network.addConductor(busCP, feederNet.busConnection);
        
        feederConnections.push(feederNet);
      });
      
      // STAGE 2: Generate Conductors
      log('\n┌─────────────────────────────────────────┐');
      log('│ STAGE 2: GENERATE ELECTRICAL CONDUCTORS   │');
      log('└─────────────────────────────────────────┘');
      
      generateConductors(network);
      
      // STAGE 3: Construction Draft
      log('\n┌─────────────────────────────────────────┐');
      log('│ STAGE 3: CONSTRUCTION DRAFT               │');
      log('└─────────────────────────────────────────┘');
      
      const draft = createConstructionDraft(network);
      
      // STAGE 4: Normalize Geometry
      log('\n┌─────────────────────────────────────────┐');
      log('│ STAGE 4: NORMALIZE GEOMETRY               │');
      log('└─────────────────────────────────────────┘');
      
      const norm = normalizeGeometry(draft);
      
      // STAGE 5: Generate SVG
      log('\n┌─────────────────────────────────────────┐');
      log('│ STAGE 5: GENERATE SVG                     │');
      log('└─────────────────────────────────────────┘');
      
      generateSVG(network, draft, norm);
      
      log('\n' + '═'.repeat(50));
      log('RENDER COMPLETE');
      log('═'.repeat(50));
    }
    
    function setFeederState(feederNum, state) {
      feederStates[feederNum] = state;
      
      // Update buttons
      ['closed', 'open', 'unknown'].forEach(s => {
        document.getElementById(`f${feederNum}-${s}`).classList.remove('btn-active');
      });
      document.getElementById(`f${feederNum}-${state.toLowerCase()}`).classList.add('btn-active');
      
      // Re-render (full pipeline)
      render();
    }
    
    // Initial render
    render();
  </script>
