<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substation Bay - Iteration 3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #000000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.875rem; margin-bottom: 1rem; }
    .container { background: #111; border-radius: 12px; padding: 1.5rem; }
    svg { display: block; background: #000; }
    .controls { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .btn {
      padding: 0.5rem 1rem;
      border: 2px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.15s;
      min-width: 90px;
      background: #222;
      color: #fff;
    }
    .btn:hover { transform: translateY(-1px); border-color: #666; }
    .btn-active { box-shadow: 0 0 0 2px #fff; }
    .btn-closed { border-color: #FF4444; }
    .btn-closed.btn-active { background: #FF4444; color: #fff; }
    .btn-open { border-color: #44FF44; }
    .btn-open.btn-active { background: #44FF44; color: #000; }
    .btn-unknown { border-color: #888; }
    .btn-unknown.btn-active { background: #888; color: #000; }
  </style>
</head>
<body>
  <h1>Substation Bay - Primitive Composition (Iteration 3)</h1>
  <p class="subtitle">69 kV Configuration | NGCP Profile</p>
  
  <div class="container">
    <svg id="sld" width="850" height="750" viewBox="0 0 850 750">
      <!-- Background -->
      <rect width="850" height="750" fill="#000"/>
      
      <!-- ============================================== -->
      <!-- 69kV Bus (Cyan #00FFFF per NGCP Profile)     -->
      <!-- ============================================== -->
      <g id="main-bus">
        <line x1="80" y1="50" x2="770" y2="50" 
              stroke="#00FFFF" stroke-width="8" stroke-linecap="round"/>
        <text x="425" y="40" text-anchor="middle" fill="#fff" font-size="14">69 kV Bus</text>
      </g>
      
      <!-- Incoming feeder label -->
      <text x="425" y="25" text-anchor="middle" fill="#fff" font-size="14">Incoming</text>
      <line x1="425" y1="30" x2="425" y2="45" stroke="#00FFFF" stroke-width="4"/>
      
      <!-- ============================================== -->
      <!-- FEEDER 1 (Left) - OPEN                       -->
      <!-- KNIFE SWITCH GEOMETRY: Gap=52px, Blade=53px -->
      <!-- Contacts: 94px (top), 146px (bottom)         -->
      <!-- ============================================== -->
      <g id="feeder1" transform="translate(100, 0)">
        
        <!-- Main conductor (continuous per EXP-012) -->
        <line x1="0" y1="50" x2="0" y2="200" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== DS1-T (Disconnect Switch - Inline) ========== -->
        <!-- Using KNIFE SWITCH GEOMETRY (EXP-011)                   -->
        <g id="ds1-top" transform="translate(0, 200)">
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f1ds-top-knife" x1="0" y1="94" x2="0" y2="147" 
                stroke="#44FF44" stroke-width="5" stroke-linecap="round"/>
        </g>
        
        <!-- Conductor segment -->
        <line x1="0" y1="350" x2="0" y2="400" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== ES1-T (Earthing Switch - Branch) ========== -->
        <!-- Per EXP-012: ES connects via SHORT BRANCH from main   -->
        <!-- Main conductor remains CONTINUOUS                      -->
        <!-- NOTE: Branch geometry synthesized (not in knowledge)   -->
        <g id="es1-top" transform="translate(0, 400)">
          <!-- T-junction branch -->
          <line x1="0" y1="0" x2="30" y2="30" stroke="#00FFFF" stroke-width="4"/>
          <!-- Knife switch on branch -->
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f1es-top-knife" x1="30" y1="94" x2="30" y2="147" 
                stroke="#44FF44" stroke-width="5" stroke-linecap="round"/>
          <!-- Ground conductor (after knife per EXP-012) -->
          <line x1="30" y1="150" x2="30" y2="180" stroke="#00FFFF" stroke-width="4"/>
          <!-- Ground symbol (always visible per EXP-012) -->
          <g transform="translate(30, 200)">
            <line x1="0" y1="-20" x2="0" y2="0" stroke="#00FFFF" stroke-width="4"/>
            <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#00FFFF" stroke-width="3"/>
            <line x1="-8" y1="0" x2="8" y2="0" stroke="#00FFFF" stroke-width="3"/>
            <line x1="-4" y1="8" x2="4" y2="8" stroke="#00FFFF" stroke-width="3"/>
          </g>
        </g>
        
        <!-- Main conductor continues past ES (per EXP-012) -->
        <line x1="0" y1="420" x2="0" y2="600" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== CB1 (Circuit Breaker) ========== -->
        <!-- SYNTHESIZED: vertical orientation for bay layout -->
        <g id="cb1" transform="translate(0, 600)">
          <rect id="f1-body" x="-20" y="0" width="40" height="50" 
                fill="#44FF44" stroke="#00FFFF" stroke-width="2" rx="4"/>
          <line x1="0" y1="-5" x2="0" y2="0" stroke="#00FFFF" stroke-width="4"/>
          <line x1="0" y1="50" x2="0" y2="55" stroke="#00FFFF" stroke-width="4"/>
        </g>
        
        <!-- Conductor segment -->
        <line x1="0" y1="655" x2="0" y2="700" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== DS1-B (Disconnect Switch - Inline) ========== -->
        <g id="ds1-bottom" transform="translate(0, 700)">
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f1ds-bottom-knife" x1="0" y1="94" x2="0" y2="147" 
                stroke="#44FF44" stroke-width="5" stroke-linecap="round"/>
        </g>
        
        <!-- Conductor to ground/outgoing -->
        <line x1="0" y1="850" x2="0" y2="900" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- Outgoing label -->
        <text x="0" y="930" text-anchor="middle" fill="#fff" font-size="14">Outgoing 1</text>
      </g>
      
      <!-- ============================================== -->
      <!-- FEEDER 2 (Center) - CLOSED                   -->
      <!-- ============================================== -->
      <g id="feeder2" transform="translate(425, 0)">
        
        <!-- Main conductor -->
        <line x1="0" y1="50" x2="0" y2="200" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== DS2-T ========== -->
        <g id="ds2-top" transform="translate(0, 200)">
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f2ds-top-knife" x1="0" y1="94" x2="0" y2="147" 
                stroke="#FF4444" stroke-width="5" stroke-linecap="round"/>
        </g>
        
        <!-- Conductor segment -->
        <line x1="0" y1="350" x2="0" y2="400" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== ES2-T ========== -->
        <g id="es2-top" transform="translate(0, 400)">
          <line x1="0" y1="0" x2="30" y2="30" stroke="#00FFFF" stroke-width="4"/>
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f2es-top-knife" x1="30" y1="94" x2="30" y2="147" 
                stroke="#FF4444" stroke-width="5" stroke-linecap="round"/>
          <line x1="30" y1="150" x2="30" y2="180" stroke="#00FFFF" stroke-width="4"/>
          <g transform="translate(30, 200)">
            <line x1="0" y1="-20" x2="0" y2="0" stroke="#00FFFF" stroke-width="4"/>
            <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#00FFFF" stroke-width="3"/>
            <line x1="-8" y1="0" x2="8" y2="0" stroke="#00FFFF" stroke-width="3"/>
            <line x1="-4" y1="8" x2="4" y2="8" stroke="#00FFFF" stroke-width="3"/>
          </g>
        </g>
        
        <!-- Main conductor continues -->
        <line x1="0" y1="420" x2="0" y2="600" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== CB2 ========== -->
        <g id="cb2" transform="translate(0, 600)">
          <rect id="f2-body" x="-20" y="0" width="40" height="50" 
                fill="#FF4444" stroke="#00FFFF" stroke-width="2" rx="4"/>
          <line x1="0" y1="-5" x2="0" y2="0" stroke="#00FFFF" stroke-width="4"/>
          <line x1="0" y1="50" x2="0" y2="55" stroke="#00FFFF" stroke-width="4"/>
        </g>
        
        <!-- Conductor segment -->
        <line x1="0" y1="655" x2="0" y2="700" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== DS2-B ========== -->
        <g id="ds2-bottom" transform="translate(0, 700)">
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f2ds-bottom-knife" x1="0" y1="94" x2="0" y2="147" 
                stroke="#FF4444" stroke-width="5" stroke-linecap="round"/>
        </g>
        
        <!-- Conductor -->
        <line x1="0" y1="850" x2="0" y2="900" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- Outgoing label -->
        <text x="0" y="930" text-anchor="middle" fill="#fff" font-size="14">Outgoing 2</text>
      </g>
      
      <!-- ============================================== -->
      <!-- FEEDER 3 (Right) - UNKNOWN                   -->
      <!-- ============================================== -->
      <g id="feeder3" transform="translate(750, 0)">
        
        <!-- Main conductor -->
        <line x1="0" y1="50" x2="0" y2="200" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== DS3-T ========== -->
        <g id="ds3-top" transform="translate(0, 200)">
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f3ds-top-knife" x1="0" y1="94" x2="0" y2="147" 
                stroke="#888" stroke-width="5" stroke-linecap="round" style="display:none"/>
        </g>
        
        <!-- Conductor segment -->
        <line x1="0" y1="350" x2="0" y2="400" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== ES3-T ========== -->
        <g id="es3-top" transform="translate(0, 400)">
          <line x1="0" y1="0" x2="30" y2="30" stroke="#00FFFF" stroke-width="4"/>
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <!-- Knife hidden in UNKNOWN per knowledge -->
          <line id="f3es-top-knife" x1="30" y1="94" x2="30" y2="147" 
                stroke="#888" stroke-width="5" stroke-linecap="round" style="display:none"/>
          <line x1="30" y1="150" x2="30" y2="180" stroke="#00FFFF" stroke-width="4"/>
          <g transform="translate(30, 200)">
            <line x1="0" y1="-20" x2="0" y2="0" stroke="#00FFFF" stroke-width="4"/>
            <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#00FFFF" stroke-width="3"/>
            <line x1="-8" y1="0" x2="8" y2="0" stroke="#00FFFF" stroke-width="3"/>
            <line x1="-4" y1="8" x2="4" y2="8" stroke="#00FFFF" stroke-width="3"/>
          </g>
        </g>
        
        <!-- Main conductor continues -->
        <line x1="0" y1="420" x2="0" y2="600" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== CB3 ========== -->
        <g id="cb3" transform="translate(0, 600)">
          <!-- CB hidden in UNKNOWN -->
          <rect id="f3-body" x="-20" y="0" width="40" height="50" 
                fill="transparent" stroke="#00FFFF" stroke-width="2" rx="4" style="display:none"/>
          <line x1="0" y1="-5" x2="0" y2="0" stroke="#00FFFF" stroke-width="4"/>
          <line x1="0" y1="50" x2="0" y2="55" stroke="#00FFFF" stroke-width="4"/>
        </g>
        
        <!-- Conductor segment -->
        <line x1="0" y1="655" x2="0" y2="700" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- ========== DS3-B ========== -->
        <g id="ds3-bottom" transform="translate(0, 700)">
          <line x1="-15" y1="94" x2="15" y2="94" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line x1="-15" y1="146" x2="15" y2="146" 
                stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
          <line id="f3ds-bottom-knife" x1="0" y1="94" x2="0" y2="147" 
                stroke="#888" stroke-width="5" stroke-linecap="round" style="display:none"/>
        </g>
        
        <!-- Conductor -->
        <line x1="0" y1="850" x2="0" y2="900" stroke="#00FFFF" stroke-width="4"/>
        
        <!-- Outgoing label -->
        <text x="0" y="930" text-anchor="middle" fill="#fff" font-size="14">Outgoing 3</text>
      </g>
      
    </svg>
    
    <div class="controls">
      <div style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;">
        <div style="text-align: center;">
          <div style="color: #44FF44; font-size: 0.75rem; margin-bottom: 0.5rem;">FEEDER 1</div>
          <button class="btn btn-closed" onclick="setFeederState(1, 'CLOSED')">CLOSED</button>
          <button class="btn btn-open btn-active" onclick="setFeederState(1, 'OPEN')">OPEN</button>
          <button class="btn btn-unknown" onclick="setFeederState(1, 'UNKNOWN')">UNKNOWN</button>
        </div>
        <div style="text-align: center;">
          <div style="color: #FF4444; font-size: 0.75rem; margin-bottom: 0.5rem;">FEEDER 2</div>
          <button class="btn btn-closed btn-active" onclick="setFeederState(2, 'CLOSED')">CLOSED</button>
          <button class="btn btn-open" onclick="setFeederState(2, 'OPEN')">OPEN</button>
          <button class="btn btn-unknown" onclick="setFeederState(2, 'UNKNOWN')">UNKNOWN</button>
        </div>
        <div style="text-align: center;">
          <div style="color: #888; font-size: 0.75rem; margin-bottom: 0.5rem;">FEEDER 3</div>
          <button class="btn btn-closed" onclick="setFeederState(3, 'CLOSED')">CLOSED</button>
          <button class="btn btn-open" onclick="setFeederState(3, 'OPEN')">OPEN</button>
          <button class="btn btn-unknown btn-active" onclick="setFeederState(3, 'UNKNOWN')">UNKNOWN</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // KNIFE SWITCH GEOMETRY (EXP-011)
    // Retrieved from: knowledge/primitives/knife-switch.md
    // TOP_CONTACT_Y = 94px
    // BOTTOM_CONTACT_Y = 146px
    // GAP = 52px
    // BLADE_LENGTH = 53px (gap + 1px)
    // ============================================
    
    const KNIFE_GEOMETRY = {
      GAP: 52,
      BLADE_LENGTH: 53,
      TOP_CONTACT_Y: 94,
      BOTTOM_CONTACT_Y: 146,
      PIVOT_Y: 96,
      CONTACT_WIDTH: 30,
      CONTACT_THICKNESS: 3,
      BLADE_WIDTH: 5,
      OPEN_ANGLE: 40
    };
    
    // ============================================
    // STATE CONFIGURATION
    // Retrieved from knowledge/primitives/
    // ============================================
    const STATES = {
      OPEN: {
        angle: 40,
        color: '#44FF44',
        cbFill: '#44FF44',
        visible: true
      },
      CLOSED: {
        angle: 0,
        color: '#FF4444',
        cbFill: '#FF4444',
        visible: true
      },
      UNKNOWN: {
        angle: 0,
        color: 'transparent',
        cbFill: 'transparent',
        visible: false
      }
    };
    
    // ============================================
    // KNIFE SWITCH UPDATE
    // Per EXP-011: BLADE_LENGTH = GAP + 1px
    // OPEN angle = 40 degrees
    // CLOSED angle = 0 degrees
    // ============================================
    function updateKnifeSwitch(knifeId, state) {
      const knife = document.getElementById(knifeId);
      if (!knife) return;
      
      const config = STATES[state];
      const geo = KNIFE_GEOMETRY;
      
      if (!config.visible) {
        knife.style.display = 'none';
        return;
      }
      
      knife.style.display = 'block';
      
      const centerX = parseFloat(knife.getAttribute('x1'));
      const centerY = geo.TOP_CONTACT_Y + (geo.GAP / 2) + 1;
      const halfLength = (geo.GAP + 1) / 2;
      
      if (config.angle === 0) {
        // CLOSED: inline vertical
        knife.setAttribute('x1', centerX);
        knife.setAttribute('y1', geo.TOP_CONTACT_Y);
        knife.setAttribute('x2', centerX);
        knife.setAttribute('y2', geo.BOTTOM_CONTACT_Y + 1);
      } else {
        // OPEN: 40° rotation
        const angleRad = config.angle * Math.PI / 180;
        const dx = Math.sin(angleRad) * halfLength;
        const dy = Math.cos(angleRad) * halfLength;
        
        knife.setAttribute('x1', centerX - dx);
        knife.setAttribute('y1', centerY - dy);
        knife.setAttribute('x2', centerX + dx);
        knife.setAttribute('y2', centerY + dy);
      }
      
      knife.setAttribute('stroke', config.color);
    }
    
    // ============================================
    // BREAKER UPDATE
    // Note: CB vertical orientation SYNTHESIZED
    // Knowledge only defines horizontal CB
    // ============================================
    function updateBreaker(breakerId, state) {
      const body = document.getElementById(breakerId);
      if (!body) return;
      
      const config = STATES[state];
      
      if (!config.visible) {
        body.style.display = 'none';
      } else {
        body.style.display = 'block';
        body.setAttribute('fill', config.cbFill);
      }
    }
    
    // ============================================
    // FEEDER STATE CONTROL
    // ============================================
    const feederStates = { 1: 'OPEN', 2: 'CLOSED', 3: 'UNKNOWN' };
    
    function setFeederState(feeder, state) {
      feederStates[feeder] = state;
      
      const prefix = 'f' + feeder;
      
      // Update knife switches for this feeder
      updateKnifeSwitch(prefix + 'ds-top-knife', state);
      updateKnifeSwitch(prefix + 'ds-bottom-knife', state);
      updateKnifeSwitch(prefix + 'es-top-knife', state);
      updateKnifeSwitch(prefix + 'es-bottom-knife', state);
      
      // Update breaker
      updateBreaker(prefix + '-body', state);
      
      // Update button states for this feeder
      const feederIndex = feeder - 1;
      const controlDivs = document.querySelectorAll('.controls > div > div:first-child');
      if (controlDivs[feederIndex]) {
        const parent = controlDivs[feederIndex].parentElement;
        parent.querySelectorAll('.btn').forEach(btn => {
          btn.classList.remove('btn-active');
          if ((state === 'CLOSED' && btn.textContent === 'CLOSED') ||
              (state === 'OPEN' && btn.textContent === 'OPEN') ||
              (state === 'UNKNOWN' && btn.textContent === 'UNKNOWN')) {
            btn.classList.add('btn-active');
          }
        });
      }
    }
    
    // Initialize all feeders
    setFeederState(1, 'OPEN');
    setFeederState(2, 'CLOSED');
    setFeederState(3, 'UNKNOWN');
  </script>
</body>
</html>
