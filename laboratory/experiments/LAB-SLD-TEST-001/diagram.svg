<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <title>3-Feeder Single Line Diagram</title>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#fafafa"/>
  
  <!-- Bus (115kV - Yellow-Orange #FFBF00) -->
  <rect x="20" y="25" width="360" height="12" fill="#FFBF00" rx="2"/>
  <text x="200" y="15" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">115kV Bus</text>
  
  <!-- ============================================ -->
  <!-- FEEDER A - OPEN (Green knife at 40°) -->
  <!-- ============================================ -->
  <g id="FEEDER-A">
    <!-- Conductor to switch -->
    <line x1="80" y1="37" x2="80" y2="55" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- DS body (device container) -->
    <rect x="65" y="55" width="30" height="50" fill="#fff" stroke="#00AA00" stroke-width="2"/>
    
    <!-- OPEN knife at 40° -->
    <line x1="80" y1="80" x2="98" y2="60" stroke="#00AA00" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Conductor from switch -->
    <line x1="80" y1="105" x2="80" y2="180" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- Ground symbol -->
    <line x1="80" y1="180" x2="80" y2="200" stroke="#FFBF00" stroke-width="3"/>
    <line x1="70" y1="200" x2="90" y2="200" stroke="#FFBF00" stroke-width="2"/>
    <line x1="73" y1="206" x2="87" y2="206" stroke="#FFBF00" stroke-width="2"/>
    <line x1="76" y1="212" x2="84" y2="212" stroke="#FFBF00" stroke-width="2"/>
    
    <!-- Label -->
    <text x="80" y="235" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">FEEDER A</text>
    <text x="80" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#00AA00" font-weight="bold">OPEN</text>
  </g>
  
  <!-- ============================================ -->
  <!-- FEEDER B - CLOSED (Red knife at 0°) -->
  <!-- ============================================ -->
  <g id="FEEDER-B">
    <!-- Conductor to switch -->
    <line x1="200" y1="37" x2="200" y2="55" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- DS body -->
    <rect x="185" y="55" width="30" height="50" fill="#fff" stroke="#FF4444" stroke-width="2"/>
    
    <!-- CLOSED knife at 0° (horizontal) -->
    <line x1="185" y1="80" x2="215" y2="80" stroke="#FF4444" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Conductor from switch -->
    <line x1="200" y1="105" x2="200" y2="180" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- Ground symbol -->
    <line x1="200" y1="180" x2="200" y2="200" stroke="#FFBF00" stroke-width="3"/>
    <line x1="190" y1="200" x2="210" y2="200" stroke="#FFBF00" stroke-width="2"/>
    <line x1="193" y1="206" x2="207" y2="206" stroke="#FFBF00" stroke-width="2"/>
    <line x1="196" y1="212" x2="204" y2="212" stroke="#FFBF00" stroke-width="2"/>
    
    <!-- Label -->
    <text x="200" y="235" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">FEEDER B</text>
    <text x="200" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF4444" font-weight="bold">CLOSED</text>
  </g>
  
  <!-- ============================================ -->
  <!-- FEEDER C - UNKNOWN (No knife, dashed) -->
  <!-- ============================================ -->
  <g id="FEEDER-C">
    <!-- Conductor to switch -->
    <line x1="320" y1="37" x2="320" y2="55" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- DS body - dashed for UNKNOWN -->
    <rect x="305" y="55" width="30" height="50" fill="#fff" stroke="#888888" stroke-width="2" stroke-dasharray="4,3"/>
    
    <!-- No knife for UNKNOWN -->
    
    <!-- Conductor from switch -->
    <line x1="320" y1="105" x2="320" y2="180" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- Ground symbol -->
    <line x1="320" y1="180" x2="320" y2="200" stroke="#FFBF00" stroke-width="3"/>
    <line x1="310" y1="200" x2="330" y2="200" stroke="#FFBF00" stroke-width="2"/>
    <line x1="313" y1="206" x2="327" y2="206" stroke="#FFBF00" stroke-width="2"/>
    <line x1="316" y1="212" x2="324" y2="212" stroke="#FFBF00" stroke-width="2"/>
    
    <!-- Label -->
    <text x="320" y="235" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">FEEDER C</text>
    <text x="320" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#888888" font-weight="bold">UNKNOWN</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 270)">
    <text x="0" y="0" font-family="Arial" font-size="10" font-weight="bold" fill="#666">LEGEND:</text>
    
    <rect x="0" y="8" width="15" height="10" fill="#FFBF00"/>
    <text x="20" y="17" font-family="Arial" font-size="10" fill="#666">115kV Bus</text>
    
    <line x1="100" y1="13" x2="115" y2="13" stroke="#00AA00" stroke-width="2"/>
    <text x="120" y="17" font-family="Arial" font-size="10" fill="#666">OPEN (40°)</text>
    
    <line x1="190" y1="13" x2="205" y2="13" stroke="#FF4444" stroke-width="2"/>
    <text x="210" y="17" font-family="Arial" font-size="10" fill="#666">CLOSED (0°)</text>
    
    <rect x="280" y="8" width="15" height="10" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="300" y="17" font-family="Arial" font-size="10" fill="#666">UNKNOWN</text>
  </g>
</svg>
