<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <title>3-Feeder Circuit Breaker Diagram</title>
  
  <!-- Background -->
  <rect width="600" height="350" fill="#fafafa"/>
  
  <!-- ============================================ -->
  <!-- 115kV Bus Bar -->
  <!-- ============================================ -->
  <rect x="30" y="25" width="540" height="12" fill="#FFBF00" rx="2"/>
  <text x="300" y="16" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">115kV Bus</text>
  
  <!-- ============================================ -->
  <!-- FEEDER A - CB OPEN (Green fill) -->
  <!-- ============================================ -->
  <g id="FEEDER-A">
    <!-- Conductor from bus -->
    <line x1="100" y1="37" x2="100" y2="65" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- Double upward chevron TOP -->
    <polygon points="92,50 100,40 108,50" fill="none" stroke="#00AA00" stroke-width="2"/>
    <polygon points="95,56 100,49 105,56" fill="none" stroke="#00AA00" stroke-width="2"/>
    
    <!-- Main body (vertical rectangle) -->
    <rect x="92" y="56" width="16" height="48" fill="#00AA00"/>
    
    <!-- Double downward chevron BOTTOM -->
    <polygon points="92,100 100,110 108,100" fill="none" stroke="#00AA00" stroke-width="2"/>
    <polygon points="95,94 100,101 105,94" fill="none" stroke="#00AA00" stroke-width="2"/>
    
    <!-- Conductor to load -->
    <line x1="100" y1="110" x2="100" y2="160" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- Labels -->
    <text x="100" y="190" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#222">Feeder A</text>
    <text x="100" y="210" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#00AA00">OPEN</text>
  </g>
  
  <!-- ============================================ -->
  <!-- FEEDER B - CB CLOSED (Red fill) -->
  <!-- ============================================ -->
  <g id="FEEDER-B">
    <!-- Conductor from bus -->
    <line x1="300" y1="37" x2="300" y2="65" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- Double upward chevron TOP -->
    <polygon points="292,50 300,40 308,50" fill="none" stroke="#FF4444" stroke-width="2"/>
    <polygon points="295,56 300,49 305,56" fill="none" stroke="#FF4444" stroke-width="2"/>
    
    <!-- Main body (vertical rectangle) -->
    <rect x="292" y="56" width="16" height="48" fill="#FF4444"/>
    
    <!-- Double downward chevron BOTTOM -->
    <polygon points="292,100 300,110 308,100" fill="none" stroke="#FF4444" stroke-width="2"/>
    <polygon points="295,94 300,101 305,94" fill="none" stroke="#FF4444" stroke-width="2"/>
    
    <!-- Conductor to load -->
    <line x1="300" y1="110" x2="300" y2="160" stroke="#FFBF00" stroke-width="3"/>
    
    <!-- Labels -->
    <text x="300" y="190" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#222">Feeder B</text>
    <text x="300" y="210" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#FF4444">CLOSED</text>
  </g>
  
  <!-- ============================================ -->
  <!-- FEEDER C - CB UNKNOWN (No fill) -->
  <!-- ============================================ -->
  <g id="FEEDER-C">
    <!-- Conductor from bus -->
    <line x1="500" y1="37" x2="500" y2="65" stroke="#888888" stroke-width="3"/>
    
    <!-- Double upward chevron TOP (gray dashed) -->
    <polygon points="492,50 500,40 508,50" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="495,56 500,49 505,56" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Main body (NO FILL - outline only) -->
    <rect x="492" y="56" width="16" height="48" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Double downward chevron BOTTOM (gray dashed) -->
    <polygon points="492,100 500,110 508,100" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="495,94 500,101 505,94" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Conductor to load -->
    <line x1="500" y1="110" x2="500" y2="160" stroke="#888888" stroke-width="3" stroke-dasharray="4,2"/>
    
    <!-- Labels -->
    <text x="500" y="190" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#222">Feeder C</text>
    <text x="500" y="210" text-anchor="middle" font-family="Arial" font-size="14" fill="#888888">UNKNOWN</text>
  </g>
  
  <!-- ============================================ -->
  <!-- Legend -->
  <!-- ============================================ -->
  <g transform="translate(30, 240)">
    <rect x="0" y="0" width="540" height="90" fill="#fff" stroke="#ddd" rx="4"/>
    
    <text x="15" y="22" font-family="Arial" font-size="12" font-weight="bold" fill="#333">CB SYMBOL LEGEND</text>
    
    <!-- CLOSED -->
    <g transform="translate(30, 40)">
      <rect x="0" y="0" width="10" height="24" fill="#FF4444"/>
      <polygon points="-5,-4 0,-12 5,-4" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <polygon points="-5,4 0,-4 5,4" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <polygon points="-5,28 0,36 5,28" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <polygon points="-5,20 0,28 5,20" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <text x="20" y="16" font-family="Arial" font-size="11" fill="#FF4444">CLOSED (Red fill)</text>
    </g>
    
    <!-- OPEN -->
    <g transform="translate(160, 40)">
      <rect x="0" y="0" width="10" height="24" fill="#00AA00"/>
      <polygon points="-5,-4 0,-12 5,-4" fill="none" stroke="#00AA00" stroke-width="1.5"/>
      <polygon points="-5,4 0,-4 5,4" fill="none" stroke="#00AA00" stroke-width="1.5"/>
      <polygon points="-5,28 0,36 5,28" fill="none" stroke="#00AA00" stroke-width="1.5"/>
      <polygon points="-5,20 0,28 5,20" fill="none" stroke="#00AA00" stroke-width="1.5"/>
      <text x="20" y="16" font-family="Arial" font-size="11" fill="#00AA00">OPEN (Green fill)</text>
    </g>
    
    <!-- UNKNOWN -->
    <g transform="translate(290, 40)">
      <rect x="0" y="0" width="10" height="24" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="3,2"/>
      <polygon points="-5,-4 0,-12 5,-4" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="3,2"/>
      <polygon points="-5,4 0,-4 5,4" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="3,2"/>
      <polygon points="-5,28 0,36 5,28" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="3,2"/>
      <polygon points="-5,20 0,28 5,20" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="20" y="16" font-family="Arial" font-size="11" fill="#888888">UNKNOWN (No fill)</text>
    </g>
    
    <!-- Voltage bus -->
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="20" height="6" fill="#FFBF00"/>
      <text x="28" y="8" font-family="Arial" font-size="11" fill="#666">115kV Bus</text>
    </g>
    
    <!-- Chevrons note -->
    <g transform="translate(130, 70)">
      <polygon points="-5,-4 0,-10 5,-4" fill="none" stroke="#666" stroke-width="1"/>
      <polygon points="-5,4 0,-2 5,4" fill="none" stroke="#666" stroke-width="1"/>
      <text x="15" y="4" font-family="Arial" font-size="10" fill="#888">= Double chevron connectors</text>
    </g>
  </g>
</svg>
