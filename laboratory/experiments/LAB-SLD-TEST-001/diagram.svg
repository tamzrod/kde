<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330">
  <title>Disconnector (DS) - Bucket Fill Test</title>
  
  <!-- Background -->
  <rect width="700" height="330" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">DISCONNECTOR (DS) - BUCKET FILL TEST</text>
  
  <!-- ============================================ -->
  <!-- DS CLOSED - PASSES BUCKET FILL -->
  <!-- ============================================ -->
  <g transform="translate(120, 55)">
    <text x="100" y="0" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#CC0000">DS CLOSED</text>
    <text x="100" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">PASSES bucket fill test</text>
    
    <!-- Continuous filled path - NO GAPS -->
    <path d="
      M 100,25
      L 100,47
      M 92,57 L 100,47 L 108,57
      M 95,63 L 100,55 L 105,63
      M 100,63 L 100,90
      M 100,90
      M 100,90 L 100,115
      M 100,115
      M 92,130 L 100,140 L 108,130
      M 95,124 L 100,132 L 105,124
      M 100,140 L 100,165
    " fill="none" stroke="#CC0000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Inner white lines to show structure -->
    <path d="
      M 100,63 L 100,84
      M 100,96 L 100,109
      M 100,121 L 100,140
    " fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Pivot circle (white fill to create hollow look) -->
    <circle cx="100" cy="90" r="6" fill="#fafafa" stroke="#CC0000" stroke-width="2.5"/>
    
    <!-- Contact circle (white fill to create hollow look) -->
    <circle cx="100" cy="115" r="6" fill="#fafafa" stroke="#CC0000" stroke-width="2.5"/>
    
    <!-- Labels -->
    <text x="100" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#CC0000">PIVOT</text>
    <text x="100" y="197" text-anchor="middle" font-family="Arial" font-size="9" fill="#CC0000">CONTACT</text>
    <text x="100" y="217" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#CC0000">ZERO GAP - ONE CLICK FILL</text>
  </g>
  
  <!-- ============================================ -->
  <!-- DS OPEN - Shows gap -->
  <!-- ============================================ -->
  <g transform="translate(450, 55)">
    <text x="100" y="0" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#009900">DS OPEN</text>
    <text x="100" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">35° rotation - visible gap</text>
    
    <!-- Continuous filled path (except knife gap) -->
    <path d="
      M 100,25 L 100,47
      M 92,57 L 100,47 L 108,57
      M 95,63 L 100,55 L 105,63
      M 100,63 L 100,84
    " fill="none" stroke="#009900" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pivot circle (hollow) -->
    <circle cx="100" cy="90" r="6" fill="none" stroke="#009900" stroke-width="3"/>
    
    <!-- Knife (rotated 35°) -->
    <line x1="100" y1="90" x2="122" y2="68" stroke="#009900" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Gap - NO LINE connecting knife to contact -->
    
    <!-- Contact circle (hollow - separate) -->
    <circle cx="100" cy="115" r="6" fill="none" stroke="#009900" stroke-width="3"/>
    
    <!-- Bottom path -->
    <path d="
      M 92,130 L 100,140 L 108,130
      M 95,124 L 100,132 L 105,124
      M 100,140 L 100,165
    " fill="none" stroke="#009900" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Gap indicator -->
    <line x1="115" y1="78" x2="106" y2="108" stroke="#009900" stroke-width="1.5" stroke-dasharray="4,3"/>
    
    <!-- Labels -->
    <text x="100" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#009900">PIVOT</text>
    <text x="100" y="197" text-anchor="middle" font-family="Arial" font-size="9" fill="#009900">CONTACT</text>
    <text x="100" y="217" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#009900">VISIBLE GAP</text>
  </g>
  
  <!-- ============================================ -->
  <!-- Explanation -->
  <!-- ============================================ -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="660" height="65" fill="#fff" stroke="#ddd" rx="4"/>
    
    <text x="15" y="18" font-family="Arial" font-size="10" font-weight="bold" fill="#333">BUCKET FILL TEST:</text>
    
    <text x="15" y="35" font-family="Arial" font-size="10" fill="#666">
      DS CLOSED: Thick continuous path from top to bottom. If you bucket fill anywhere on the red path, it fills the entire conductor in one click.
    </text>
    
    <text x="15" y="50" font-family="Arial" font-size="10" fill="#666">
      DS OPEN: Path has a gap at the knife-contact interface. Bucket fill stops at the gap.
    </text>
    
    <text x="15" y="62" font-family="Arial" font-size="9" fill="#999">
      Note: Pivot and Contact circles have white fill to look hollow, but the surrounding path is continuous.
    </text>
  </g>
</svg>
