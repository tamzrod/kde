<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 320">
  <title>Disconnector (DS) Symbols - Moderate Angle</title>
  
  <!-- Background -->
  <rect width="650" height="320" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="325" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">DISCONNECTOR (DS)</text>
  <text x="325" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">1. Chev UP  →  2. Line  →  3. Pivot  →  4. Knife  →  5. Contact  →  6. Chev DOWN</text>
  
  <!-- ============================================ -->
  <!-- DS CLOSED -->
  <!-- ============================================ -->
  <g transform="translate(100, 70)">
    <text x="100" y="0" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#CC0000">DS CLOSED</text>
    
    <!-- Conductor -->
    <line x1="100" y1="25" x2="100" y2="42" stroke="#CC0000" stroke-width="3"/>
    
    <!-- 1. Double chevron UP (arrows, not triangles) -->
    <polygon points="92,52 100,42 108,52" fill="none" stroke="#CC0000" stroke-width="2"/>
    <polygon points="95,58 100,50 105,58" fill="none" stroke="#CC0000" stroke-width="2"/>
    
    <!-- 2. Short vertical line -->
    <line x1="100" y1="58" x2="100" y2="68" stroke="#CC0000" stroke-width="2.5"/>
    
    <!-- 3. Pivot circle -->
    <circle cx="100" cy="82" r="5" fill="none" stroke="#CC0000" stroke-width="2.5"/>
    
    <!-- 4. Knife blade - STRAIGHT VERTICAL -->
    <line x1="100" y1="77" x2="100" y2="122" stroke="#CC0000" stroke-width="5" stroke-linecap="round"/>
    
    <!-- 5. Contact circle (NOT part of knife - separate) -->
    <circle cx="100" cy="127" r="5" fill="none" stroke="#CC0000" stroke-width="2.5"/>
    
    <!-- 6. Double chevron DOWN -->
    <polygon points="92,142 100,152 108,142" fill="none" stroke="#CC0000" stroke-width="2"/>
    <polygon points="95,136 100,144 105,136" fill="none" stroke="#CC0000" stroke-width="2"/>
    
    <!-- Conductor -->
    <line x1="100" y1="152" x2="100" y2="165" stroke="#CC0000" stroke-width="3"/>
    
    <!-- Labels -->
    <text x="100" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#CC0000">PIVOT</text>
    <text x="100" y="197" text-anchor="middle" font-family="Arial" font-size="9" fill="#CC0000">CONTACT</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#CC0000">ZERO AIR GAP</text>
  </g>
  
  <!-- ============================================ -->
  <!-- DS OPEN -->
  <!-- ============================================ -->
  <g transform="translate(420, 70)">
    <text x="100" y="0" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#008800">DS OPEN</text>
    
    <!-- Conductor -->
    <line x1="100" y1="25" x2="100" y2="42" stroke="#008800" stroke-width="3"/>
    
    <!-- 1. Double chevron UP -->
    <polygon points="92,52 100,42 108,52" fill="none" stroke="#008800" stroke-width="2"/>
    <polygon points="95,58 100,50 105,58" fill="none" stroke="#008800" stroke-width="2"/>
    
    <!-- 2. Short vertical line -->
    <line x1="100" y1="58" x2="100" y2="68" stroke="#008800" stroke-width="2.5"/>
    
    <!-- 3. Pivot circle -->
    <circle cx="100" cy="82" r="5" fill="none" stroke="#008800" stroke-width="2.5"/>
    
    <!-- 4. Knife blade - ANGLED 30-45 degrees (moderate) -->
    <line x1="100" y1="82" x2="125" y2="57" stroke="#008800" stroke-width="5" stroke-linecap="round"/>
    
    <!-- 5. Contact circle (NOT part of knife - separate position) -->
    <circle cx="118" cy="52" r="5" fill="none" stroke="#008800" stroke-width="2.5"/>
    
    <!-- 6. Double chevron DOWN -->
    <polygon points="92,142 100,152 108,142" fill="none" stroke="#008800" stroke-width="2"/>
    <polygon points="95,136 100,144 105,136" fill="none" stroke="#008800" stroke-width="2"/>
    
    <!-- Conductor -->
    <line x1="100" y1="152" x2="100" y2="165" stroke="#008800" stroke-width="3"/>
    
    <!-- Labels -->
    <text x="100" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#008800">PIVOT</text>
    <text x="120" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#008800">CONTACT</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#008800">~30-45° ANGLE</text>
  </g>
  
  <!-- ============================================ -->
  <!-- Legend -->
  <!-- ============================================ -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="610" height="55" fill="#fff" stroke="#ddd" rx="4"/>
    
    <text x="15" y="18" font-family="Arial" font-size="10" font-weight="bold" fill="#333">STRUCTURE:</text>
    
    <!-- Chevron symbol -->
    <g transform="translate(100, 12)">
      <polygon points="-5,0 0,-6 5,0" fill="none" stroke="#666" stroke-width="1.5"/>
      <polygon points="-5,5 0,1 5,5" fill="none" stroke="#666" stroke-width="1.5"/>
      <text x="12" y="5" font-family="Arial" font-size="9" fill="#666">Chevron (arrow)</text>
    </g>
    
    <!-- Pivot symbol -->
    <g transform="translate(230, 12)">
      <circle cx="0" cy="2" r="4" fill="none" stroke="#666" stroke-width="1.5"/>
      <text x="12" y="5" font-family="Arial" font-size="9" fill="#666">Pivot (rotation center)</text>
    </g>
    
    <!-- Knife symbol -->
    <g transform="translate(370, 12)">
      <line x1="-4" y1="-6" x2="0" y2="6" stroke="#666" stroke-width="3" stroke-linecap="round"/>
      <text x="12" y="5" font-family="Arial" font-size="9" fill="#666">Knife blade</text>
    </g>
    
    <!-- Contact symbol -->
    <g transform="translate(480, 12)">
      <circle cx="0" cy="2" r="4" fill="none" stroke="#666" stroke-width="1.5"/>
      <circle cx="0" cy="2" r="2" fill="#666"/>
      <text x="12" y="5" font-family="Arial" font-size="9" fill="#666">Contact</text>
    </g>
    
    <text x="15" y="45" font-family="Arial" font-size="10" fill="#666">Note: Contact circle is NOT part of knife - it's a separate receiving point.</text>
  </g>
</svg>
