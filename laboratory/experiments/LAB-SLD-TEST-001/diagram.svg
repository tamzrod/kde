<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>SLD Component Symbols - Reusable Library</title>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  
  <!-- ============================================ -->
  <!-- SECTION 1: CIRCUIT BREAKER (CB) -->
  <!-- ============================================ -->
  <text x="30" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Circuit Breaker (CB)</text>
  <text x="30" y="45" font-family="Arial" font-size="10" fill="#666">Series component - continuous path when CLOSED</text>
  
  <!-- CB CLOSED -->
  <g transform="translate(50, 70)">
    <!-- Top conductor -->
    <line x1="40" y1="0" x2="40" y2="25" stroke="#FF4444" stroke-width="3"/>
    <!-- Double chevron TOP -->
    <polygon points="32,30 40,22 48,30" fill="none" stroke="#FF4444" stroke-width="2"/>
    <polygon points="35,35 40,29 45,35" fill="none" stroke="#FF4444" stroke-width="2"/>
    <!-- Body (filled red) -->
    <rect x="32" y="35" width="16" height="40" fill="#FF4444"/>
    <!-- Double chevron BOTTOM -->
    <polygon points="32,72 40,80 48,72" fill="none" stroke="#FF4444" stroke-width="2"/>
    <polygon points="35,67 40,73 45,67" fill="none" stroke="#FF4444" stroke-width="2"/>
    <!-- Bottom conductor -->
    <line x1="40" y1="80" x2="40" y2="105" stroke="#FF4444" stroke-width="3"/>
    <!-- Label -->
    <text x="40" y="130" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#FF4444">CB CLOSED</text>
    <text x="40" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Solid red</text>
  </g>
  
  <!-- CB OPEN -->
  <g transform="translate(200, 70)">
    <!-- Top conductor -->
    <line x1="40" y1="0" x2="40" y2="25" stroke="#00AA00" stroke-width="3"/>
    <!-- Double chevron TOP -->
    <polygon points="32,30 40,22 48,30" fill="none" stroke="#00AA00" stroke-width="2"/>
    <polygon points="35,35 40,29 45,35" fill="none" stroke="#00AA00" stroke-width="2"/>
    <!-- Body (filled green) -->
    <rect x="32" y="35" width="16" height="40" fill="#00AA00"/>
    <!-- Double chevron BOTTOM -->
    <polygon points="32,72 40,80 48,72" fill="none" stroke="#00AA00" stroke-width="2"/>
    <polygon points="35,67 40,73 45,67" fill="none" stroke="#00AA00" stroke-width="2"/>
    <!-- Bottom conductor -->
    <line x1="40" y1="80" x2="40" y2="105" stroke="#00AA00" stroke-width="3"/>
    <!-- Label -->
    <text x="40" y="130" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00AA00">CB OPEN</text>
    <text x="40" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Solid green</text>
  </g>
  
  <!-- CB UNKNOWN -->
  <g transform="translate(350, 70)">
    <!-- Top conductor -->
    <line x1="40" y1="0" x2="40" y2="25" stroke="#888888" stroke-width="3" stroke-dasharray="4,2"/>
    <!-- Double chevron TOP (dashed) -->
    <polygon points="32,30 40,22 48,30" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="35,35 40,29 45,35" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Body (no fill, dashed outline) -->
    <rect x="32" y="35" width="16" height="40" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Double chevron BOTTOM (dashed) -->
    <polygon points="32,72 40,80 48,72" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="35,67 40,73 45,67" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Bottom conductor -->
    <line x1="40" y1="80" x2="40" y2="105" stroke="#888888" stroke-width="3" stroke-dasharray="4,2"/>
    <!-- Label -->
    <text x="40" y="130" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#888888">CB UNKNOWN</text>
    <text x="40" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">No fill</text>
  </g>
  
  <!-- ============================================ -->
  <!-- SECTION 2: DISCONNECTOR (DS) -->
  <!-- ============================================ -->
  <text x="30" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Disconnector (DS)</text>
  <text x="30" y="265" font-family="Arial" font-size="10" fill="#666">Series component - continuous path when CLOSED</text>
  
  <!-- DS CLOSED -->
  <g transform="translate(50, 290)">
    <!-- Top conductor -->
    <line x1="40" y1="0" x2="40" y2="25" stroke="#FF4444" stroke-width="3"/>
    <!-- Double chevron TOP -->
    <polygon points="32,30 40,22 48,30" fill="none" stroke="#FF4444" stroke-width="2"/>
    <polygon points="35,35 40,29 45,35" fill="none" stroke="#FF4444" stroke-width="2"/>
    <!-- DS Body structure -->
    <line x1="40" y1="35" x2="40" y2="45" stroke="#FF4444" stroke-width="2"/>
    <!-- Pivot circle -->
    <circle cx="40" cy="50" r="4" fill="none" stroke="#FF4444" stroke-width="2"/>
    <!-- Knife (horizontal = CLOSED) -->
    <line x1="32" y1="50" x2="48" y2="50" stroke="#FF4444" stroke-width="3" stroke-linecap="round"/>
    <!-- Contact circle -->
    <circle cx="48" cy="50" r="3" fill="#FF4444"/>
    <!-- Bottom line -->
    <line x1="40" y1="54" x2="40" y2="65" stroke="#FF4444" stroke-width="2"/>
    <!-- Double chevron BOTTOM -->
    <polygon points="32,70 40,78 48,70" fill="none" stroke="#FF4444" stroke-width="2"/>
    <polygon points="35,65 40,71 45,65" fill="none" stroke="#FF4444" stroke-width="2"/>
    <!-- Bottom conductor -->
    <line x1="40" y1="78" x2="40" y2="100" stroke="#FF4444" stroke-width="3"/>
    <!-- Label -->
    <text x="40" y="125" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#FF4444">DS CLOSED</text>
    <text x="40" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Knife horizontal</text>
  </g>
  
  <!-- DS OPEN -->
  <g transform="translate(200, 290)">
    <!-- Top conductor -->
    <line x1="40" y1="0" x2="40" y2="25" stroke="#00AA00" stroke-width="3"/>
    <!-- Double chevron TOP -->
    <polygon points="32,30 40,22 48,30" fill="none" stroke="#00AA00" stroke-width="2"/>
    <polygon points="35,35 40,29 45,35" fill="none" stroke="#00AA00" stroke-width="2"/>
    <!-- DS Body structure -->
    <line x1="40" y1="35" x2="40" y2="45" stroke="#00AA00" stroke-width="2"/>
    <!-- Pivot circle -->
    <circle cx="40" cy="50" r="4" fill="none" stroke="#00AA00" stroke-width="2"/>
    <!-- Knife (angled = OPEN) -->
    <line x1="40" y1="50" x2="50" y2="40" stroke="#00AA00" stroke-width="3" stroke-linecap="round"/>
    <!-- Contact circle (separated) -->
    <circle cx="48" cy="48" r="3" fill="none" stroke="#00AA00" stroke-width="1.5"/>
    <!-- Gap indication -->
    <line x1="44" y1="44" x2="46" y2="46" stroke="#00AA00" stroke-width="1" stroke-dasharray="2,1"/>
    <!-- Bottom line -->
    <line x1="40" y1="54" x2="40" y2="65" stroke="#00AA00" stroke-width="2"/>
    <!-- Double chevron BOTTOM -->
    <polygon points="32,70 40,78 48,70" fill="none" stroke="#00AA00" stroke-width="2"/>
    <polygon points="35,65 40,71 45,65" fill="none" stroke="#00AA00" stroke-width="2"/>
    <!-- Bottom conductor -->
    <line x1="40" y1="78" x2="40" y2="100" stroke="#00AA00" stroke-width="3"/>
    <!-- Label -->
    <text x="40" y="125" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00AA00">DS OPEN</text>
    <text x="40" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Knife angled</text>
  </g>
  
  <!-- ============================================ -->
  <!-- SECTION 3: EARTHING SWITCH (ES) -->
  <!-- ============================================ -->
  <text x="350" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Earthing Switch (ES)</text>
  <text x="350" y="265" font-family="Arial" font-size="10" fill="#666">Series component - connects to ground</text>
  
  <!-- ES (Single state) -->
  <g transform="translate(400, 290)">
    <!-- Top conductor -->
    <line x1="40" y1="0" x2="40" y2="40" stroke="#333" stroke-width="3"/>
    <!-- Horizontal switch bar -->
    <line x1="20" y1="40" x2="60" y2="40" stroke="#333" stroke-width="2"/>
    <!-- Switch handle (closed = grounded) -->
    <line x1="40" y1="40" x2="40" y2="55" stroke="#FF4444" stroke-width="2"/>
    <!-- Ground symbol -->
    <line x1="40" y1="55" x2="40" y2="65" stroke="#333" stroke-width="2"/>
    <line x1="28" y1="65" x2="52" y2="65" stroke="#333" stroke-width="2.5"/>
    <line x1="32" y1="72" x2="48" y2="72" stroke="#333" stroke-width="2.5"/>
    <line x1="36" y1="79" x2="44" y2="79" stroke="#333" stroke-width="2.5"/>
    <!-- Label -->
    <text x="40" y="105" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">ES</text>
    <text x="40" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Ground symbol</text>
  </g>
  
  <!-- ES OPEN variant -->
  <g transform="translate(550, 290)">
    <!-- Top conductor -->
    <line x1="40" y1="0" x2="40" y2="40" stroke="#333" stroke-width="3"/>
    <!-- Horizontal switch bar -->
    <line x1="20" y1="40" x2="60" y2="40" stroke="#333" stroke-width="2"/>
    <!-- Switch handle (open = not grounded) -->
    <line x1="40" y1="40" x2="55" y2="25" stroke="#00AA00" stroke-width="2"/>
    <!-- Ground symbol (disconnected) -->
    <line x1="40" y1="55" x2="40" y2="65" stroke="#888888" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="28" y1="65" x2="52" y2="65" stroke="#888888" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="32" y1="72" x2="48" y2="72" stroke="#888888" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="36" y1="79" x2="44" y2="79" stroke="#888888" stroke-width="2" stroke-dasharray="3,2"/>
    <!-- Label -->
    <text x="40" y="105" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00AA00">ES OPEN</text>
    <text x="40" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Not grounded</text>
  </g>
  
  <!-- ============================================ -->
  <!-- LEGEND -->
  <!-- ============================================ -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="740" height="65" fill="#fff" stroke="#ddd" rx="4"/>
    
    <text x="15" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#333">SYMBOL LIBRARY LEGEND</text>
    
    <!-- Series components -->
    <g transform="translate(15, 35)">
      <text x="0" y="0" font-family="Arial" font-size="10" font-weight="bold" fill="#666">Series (2 connections):</text>
      <rect x="100" y="-10" width="8" height="16" fill="#FF4444"/>
      <polygon points="96,2 100,-4 104,2" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <polygon points="96,6 100,2 104,6" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <polygon points="96,14 100,20 104,14" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <polygon points="96,10 100,14 104,10" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <text x="115" y="5" font-family="Arial" font-size="10" fill="#666">CB</text>
      
      <rect x="145" y="-10" width="8" height="8" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <circle cx="149" cy="3" r="2.5" fill="none" stroke="#FF4444" stroke-width="1.5"/>
      <line x1="145" y1="3" x2="153" y2="3" stroke="#FF4444" stroke-width="2"/>
      <text x="160" y="5" font-family="Arial" font-size="10" fill="#666">DS</text>
    </g>
    
    <!-- Colors -->
    <g transform="translate(220, 35)">
      <text x="0" y="0" font-family="Arial" font-size="10" font-weight="bold" fill="#666">Colors:</text>
      <rect x="55" y="-6" width="12" height="12" fill="#FF4444"/>
      <text x="72" y="5" font-family="Arial" font-size="10" fill="#666">= CLOSED</text>
      <rect x="125" y="-6" width="12" height="12" fill="#00AA00"/>
      <text x="142" y="5" font-family="Arial" font-size="10" fill="#666">= OPEN</text>
      <rect x="180" y="-6" width="12" height="12" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="2,1"/>
      <text x="198" y="5" font-family="Arial" font-size="10" fill="#666">= UNKNOWN</text>
    </g>
    
    <!-- Chevrons -->
    <g transform="translate(380, 35)">
      <text x="0" y="0" font-family="Arial" font-size="10" font-weight="bold" fill="#666">Connectors:</text>
      <polygon points="55,-6 60,-12 65,-6" fill="none" stroke="#666" stroke-width="1.5"/>
      <polygon points="55,2 60,-4 65,2" fill="none" stroke="#666" stroke-width="1.5"/>
      <text x="72" y="0" font-family="Arial" font-size="10" fill="#666">= Double chevron</text>
      <line x1="160" y1="-2" x2="175" y2="-2" stroke="#333" stroke-width="2"/>
      <line x1="160" y1="-6" x2="175" y2="2" stroke="#333" stroke-width="2"/>
      <text x="182" y="0" font-family="Arial" font-size="10" fill="#666">= Knife</text>
      <circle cx="200" cy="-2" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
      <text x="208" y="0" font-family="Arial" font-size="10" fill="#666">= Pivot</text>
    </g>
  </g>
</svg>
